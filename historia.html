<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="mobile-fixes.css">
<title>Historia clínica | Espacio Mimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #f4f7f6; font-family: 'Poppins', sans-serif; position: relative; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: -80px; left: -80px; width: 400px; height: 400px; background: radial-gradient(circle at center, #72bd9930 0%, transparent 70%); border-radius: 50%; filter: blur(20px); pointer-events: none; }
        body::after { content: ""; position: fixed; bottom: -80px; right: -80px; width: 400px; height: 400px; background: radial-gradient(circle at center, #72bd9930 0%, transparent 70%); border-radius: 50%; filter: blur(20px); pointer-events: none; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; margin-top: 40px; margin-bottom: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08); position: relative; z-index: 2; }
        .logo { display: block; margin: auto; width: 300px; margin-bottom: 20px; }
        h1 { text-align: center; font-family: 'Playfair Display', serif; color: #2c3e3a; margin-bottom: 40px; }
        h2 { margin-top: 40px; border-bottom: 2px solid #eee; padding-bottom: 10px; color: #2c3e3a; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-top: 15px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        textarea { height: 90px; resize: none; }
        .extra-info { display: none; margin-top: 10px; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity:0; transform: translateY(-5px); } to { opacity:1; transform: translateY(0); } }
        .extra-info input { border-left: 4px solid var(--verde-mimar); background: #f9fdfb; }
        .objetivo-box { margin-top: 30px; background: #f8fbfa; border: 1px solid #e3ece8; padding: 25px; border-radius: 14px; }
        .consent { margin-top: 40px; padding: 25px; background: #f4f7f6; border-radius: 12px; border: 1px solid #e3e3e3; }
        button { margin-top: 30px; background: #72bd99; color: white; border: none; padding: 16px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; opacity: .5; transition: 0.3s; }
        button.enabled { opacity: 1; }
        .required-star { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <img src="img/logo.png" class="logo">
        <h1>Historia clínica del paciente</h1>

        <h2>Datos del paciente</h2>
        <div class="grid">
            <div><label>Nombre y apellido <span class="required-star">*</span></label><input id="nombre" class="req"></div>
            <div><label>Edad</label><input id="edad"></div>
        </div>
        <label>Teléfono</label><input id="telefono">

        <div class="objetivo-box">
            <h3>Objetivo del tratamiento</h3>
            <p>Indique la zona principal y qué le gustaría mejorar.</p>
            <label>Zona principal a tratar <span class="required-star">*</span></label>
            <select id="zona">
                <option>Rostro</option><option>Abdomen</option><option>Piernas</option><option>Glúteos</option><option>Otra</option>
            </select>
            <label>Objetivo principal <span class="required-star">*</span></label>
            <textarea id="objetivo" class="req" maxlength="200" placeholder="Ej: mejorar textura de la piel..."></textarea>
        </div>

        <h2>Antecedentes de salud</h2>
        <div>
            <label>¿Tiene alguna enfermedad diagnosticada?</label>
            <select id="enfermedad" onchange="toggleExtra('enfermedad', this.value)">
                <option>No</option><option>Sí</option>
            </select>
            <div id="extra-enfermedad" class="extra-info">
                <input id="det-enfermedad" placeholder="¿Cuál enfermedad?" class="req-si">
            </div>
        </div>

        <div>
            <label>¿Toma medicación actualmente?</label>
            <select id="medicacion" onchange="toggleExtra('medicacion', this.value)">
                <option>No</option><option>Sí</option>
            </select>
            <div id="extra-medicacion" class="extra-info">
                <input id="det-medicacion" placeholder="Nombre de la medicación" class="req-si">
            </div>
        </div>

        <div>
            <label>¿Tiene alergias?</label>
            <select id="alergias" onchange="toggleExtra('alergias', this.value)">
                <option>No</option><option>Sí</option>
            </select>
            <div id="extra-alergias" class="extra-info">
                <input id="det-alergias" placeholder="¿A qué es alérgica?" class="req-si">
            </div>
        </div>

        <h2>Antecedentes ginecológicos</h2>
        <label>¿Hijos?</label>
        <select id="hijos" onchange="toggleExtra('hijos', this.value)">
            <option>No</option><option>Sí</option>
        </select>
        <div id="extra-hijos" class="extra-info">
            <input id="det-hijos" type="number" placeholder="¿Cuántos?" class="req-si">
        </div>

        <label>¿Está embarazada?</label><select id="embarazo"><option>No</option><option>Sí</option></select>

        <div class="consent">
            <label><input type="checkbox" id="consent"> Declaro que la información brindada es verdadera.</label>
        </div>
        <button id="btnContinuar" disabled>Continuar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew", projectId: "estetica-8d067" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const dni = localStorage.getItem("clienteDNI");

        // Función para mostrar/ocultar campos extras
        window.toggleExtra = (id, val) => {
            const div = document.getElementById(`extra-${id}`);
            div.style.display = val === "Sí" ? "block" : "none";
            validarFormulario();
        };

        const inputsObligatorios = document.querySelectorAll('.req');
        const checkConsent = document.getElementById("consent");
        const boton = document.getElementById("btnContinuar");

        function validarFormulario() {
            let todoCompleto = true;

            // 1. Validar inputs obligatorios base (Nombre, Objetivo)
            inputsObligatorios.forEach(input => {
                if (input.value.trim() === "") todoCompleto = false;
            });

            // 2. Validar que los "Sí" tengan su justificación
            const extrasVisibles = document.querySelectorAll('.extra-info[style*="display: block"] input');
            extrasVisibles.forEach(input => {
                if (input.value.trim() === "") todoCompleto = false;
            });

            // 3. Validar Checkbox
            if (!checkConsent.checked) todoCompleto = false;

            // Activar/Desactivar botón
            boton.disabled = !todoCompleto;
            todoCompleto ? boton.classList.add("enabled") : boton.classList.remove("enabled");
        }

        // Listeners para validación en tiempo real
        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', validarFormulario);
            el.addEventListener('change', validarFormulario);
        });

        boton.addEventListener("click", async () => {
            const datos = {
                nombre: document.getElementById("nombre").value,
                objetivo: document.getElementById("objetivo").value,
                enfermedad: document.getElementById("enfermedad").value === "Sí" ? document.getElementById("det-enfermedad").value : "No",
                medicacion: document.getElementById("medicacion").value === "Sí" ? document.getElementById("det-medicacion").value : "No",
                hijos: document.getElementById("hijos").value === "Sí" ? document.getElementById("det-hijos").value : "No",
                fechaRegistro: new Date()
            };

            try {
                await setDoc(doc(db, "historias", dni), datos);
                await updateDoc(doc(db, "clients", dni), { historiaCompletada: true });
                window.location.href = "servicios.html";
            } catch (e) { alert("Error al guardar"); }
        });
    </script>
    <script src="/js/shared-footer.js"></script>
</body>
</html>
