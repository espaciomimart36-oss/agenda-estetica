<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historia clínica | Espacio Mimar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f7f6;
font-family:'Poppins',sans-serif;
position:relative;
overflow-x:hidden;
}

/* hojas decorativas */

body::before{
content:"";
position:fixed;
top:-80px;
left:-80px;
width:400px;
height:400px;
background:radial-gradient(circle at center,#72bd9930 0%, transparent 70%);
border-radius:50%;
filter:blur(20px);
pointer-events:none;
}

body::after{
content:"";
position:fixed;
bottom:-80px;
right:-80px;
width:400px;
height:400px;
background:radial-gradient(circle at center,#72bd9930 0%, transparent 70%);
border-radius:50%;
filter:blur(20px);
pointer-events:none;
}

/* contenedor */

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
margin-top:40px;
margin-bottom:40px;
border-radius:20px;
box-shadow:0 15px 50px rgba(0,0,0,0.08);
position:relative;
z-index:2;
}

.logo{
display:block;
margin:auto;
width:300px;
margin-bottom:20px;
}

h1{
text-align:center;
font-family:'Playfair Display',serif;
color:#2c3e3a;
margin-bottom:40px;
}

h2{
margin-top:40px;
border-bottom:2px solid #eee;
padding-bottom:10px;
color:#2c3e3a;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
display:block;
margin-top:15px;
font-weight:500;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:90px;
resize:none;
}

.contador{
font-size:12px;
color:#777;
text-align:right;
margin-top:4px;
}

/* bloque objetivo */

.objetivo-box{
margin-top:30px;
background:#f8fbfa;
border:1px solid #e3ece8;
padding:25px;
border-radius:14px;
}

.objetivo-box h3{
margin-top:0;
color:#2c3e3a;
font-size:18px;
}

.objetivo-box p{
margin-top:0;
color:#777;
font-size:13px;
}

.consent{
margin-top:40px;
padding:25px;
background:#f4f7f6;
border-radius:12px;
border:1px solid #e3e3e3;
}

button{
margin-top:30px;
background:#72bd99;
color:white;
border:none;
padding:16px;
border-radius:10px;
font-size:18px;
cursor:pointer;
width:100%;
opacity:.5;
}

button.enabled{
opacity:1;
}

</style>

</head>

<body>

<div class="container">

<img src="img/logo.png" class="logo">

<h1>Historia clínica del paciente</h1>


<h2>Datos del paciente</h2>

<div class="grid">

<div>
<label>Nombre y apellido</label>
<input id="nombre">
</div>

<div>
<label>Edad</label>
<input id="edad">
</div>

</div>

<label>Teléfono</label>
<input id="telefono">


<div class="objetivo-box">

<h3>Objetivo del tratamiento</h3>
<p>Indique la zona principal y qué le gustaría mejorar.</p>

<label>Zona principal a tratar</label>
<select id="zona">
<option>Rostro</option>
<option>Abdomen</option>
<option>Piernas</option>
<option>Glúteos</option>
<option>Otra</option>
</select>

<label>Objetivo principal</label>

<textarea id="objetivo" maxlength="200"
placeholder="Ej: mejorar textura de la piel, reducir grasa localizada, tratar manchas, tonificación muscular, etc."></textarea>

<div class="contador">
<span id="contador">0</span>/200
</div>

</div>


<h2>Antecedentes de salud</h2>

<label>¿Tiene alguna enfermedad diagnosticada?</label>
<select id="enfermedad">
<option>No</option>
<option>Sí</option>
</select>

<label>¿Toma medicación actualmente?</label>
<select id="medicacion">
<option>No</option>
<option>Sí</option>
</select>

<label>¿Tiene alergias?</label>
<select id="alergias">
<option>No</option>
<option>Sí</option>
</select>


<h2>Antecedentes ginecológicos</h2>

<label>¿Está embarazada?</label>
<select id="embarazo">
<option>No</option>
<option>Sí</option>
</select>

<label>¿Está amamantando a un bebé menor de 1 año?</label>
<select id="lactancia">
<option>No</option>
<option>Sí</option>
</select>


<h2>Antecedentes estéticos</h2>

<label>¿Se realizó tratamientos estéticos?</label>
<select id="esteticos">
<option>No</option>
<option>Sí</option>
</select>


<h2>Otros antecedentes</h2>

<label>¿Tiene marcapasos?</label>
<select id="marcapasos">
<option>No</option>
<option>Sí</option>
</select>

<label>¿Tiene implantes metálicos en la zona a tratar</label>
<select id="implantes">
<option>No</option>
<option>Sí</option>
</select>

<label>¿Antecedentes de cáncer hace menos de 5 años?</label>
<select id="cancer">
<option>No</option>
<option>Sí</option>
</select>


<div class="consent">

<label>
<input type="checkbox" id="consent">
Declaro que la información brindada es verdadera y autorizo su uso para evaluación estética.
</label>

</div>

<button id="btnContinuar">Continuar</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "TU_AUTH_DOMAIN",
projectId: "estetica-8d067",
storageBucket: "TU_BUCKET",
messagingSenderId: "TU_ID",
appId: "TU_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const dni = localStorage.getItem("clienteDNI");

if(dni){

const ref = doc(db,"historias",dni);
const snap = await getDoc(ref);

if(snap.exists()){
window.location.href="servicios.html";
}

}

const textarea = document.getElementById("objetivo");
const contador = document.getElementById("contador");

textarea.addEventListener("input",()=>{
contador.innerText = textarea.value.length;
});


const checkbox = document.getElementById("consent");
const boton = document.getElementById("btnContinuar");

boton.disabled = true;

checkbox.addEventListener("change",()=>{

if(checkbox.checked){
boton.disabled=false;
boton.classList.add("enabled");
}else{
boton.disabled=true;
boton.classList.remove("enabled");
}

});

boton.addEventListener("click",guardarHistoria);


async function guardarHistoria(){

const dni = localStorage.getItem("clienteDNI");

if(!dni){
alert("No se encontró el DNI del paciente");
return;
}

const datos={

zona:document.getElementById("zona").value,
objetivo:document.getElementById("objetivo").value,

nombre:document.getElementById("nombre").value,
edad:document.getElementById("edad").value,
telefono:document.getElementById("telefono").value,

enfermedad:document.getElementById("enfermedad").value,
medicacion:document.getElementById("medicacion").value,
alergias:document.getElementById("alergias").value,

embarazo:document.getElementById("embarazo").value,
lactancia:document.getElementById("lactancia").value,

esteticos:document.getElementById("esteticos").value,

marcapasos:document.getElementById("marcapasos").value,
implantes:document.getElementById("implantes").value,
cancer:document.getElementById("cancer").value,

fechaRegistro:new Date()

};

try{

await setDoc(doc(db,"historias",dni),datos);

localStorage.setItem("ficha_completada","si");

window.location.href="servicios.html";

}catch(error){

console.error(error);
alert("Error guardando historia clínica");

}

}

</script>

</body>
</html>
