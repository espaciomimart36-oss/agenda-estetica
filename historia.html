<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimena Knack | Historia clínica</title>
    <link rel="stylesheet" href="mobile-fixes.css">
    <link rel="stylesheet" href="/pro-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #6b9080;
            --sage-dark: #4a6e5c;
            --ink: #1e2f28;
            --muted: #607268;
            --surface: rgba(255, 255, 255, 0.9);
            --border: rgba(140, 170, 155, 0.28);
            --gold: #c4a46b;
            --radius: 28px;
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
            --shadow: 0 8px 32px rgba(16, 28, 22, 0.08);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: var(--font-body);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(160deg, #f4f8f4 0%, #edf3ed 60%, #e8f0e9 100%);
        }

        body { padding: 40px 16px 72px; }

        .page-logo {
            display: block;
            width: clamp(88px, 20vw, 120px);
            margin: 0 auto 28px;
            opacity: 0.9;
            filter: drop-shadow(0 6px 16px rgba(30, 50, 38, 0.1));
            animation: fadeUp 0.4s ease both;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeUp 0.45s ease 0.04s both;
        }

        .page-eyebrow {
            font-size: 10px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--sage);
            font-weight: 700;
            margin: 0 0 10px;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: clamp(28px, 5vw, 40px);
            font-style: italic;
            color: var(--ink);
            margin: 0 0 10px;
            line-height: 1.1;
        }

        .page-divider {
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto;
        }

        .form-shell {
            max-width: 780px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            animation: fadeUp 0.5s ease both;
        }

        .section-eyebrow {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--sage);
            font-weight: 700;
            margin: 0 0 6px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: clamp(20px, 3vw, 26px);
            font-style: italic;
            color: var(--ink);
            margin: 0 0 22px;
            line-height: 1.15;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group { display: flex; flex-direction: column; gap: 7px; }
        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        label .req { color: var(--gold); }

        input, select, textarea {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid rgba(140, 170, 155, 0.36);
            border-radius: 14px;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.86);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            line-height: 1.5;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--sage);
            box-shadow: 0 0 0 4px rgba(107, 144, 128, 0.1);
        }

        textarea { height: 100px; resize: none; line-height: 1.65; }

        .extra-info {
            display: none;
            margin-top: 12px;
            animation: slideDown 0.28s ease;
        }

        .extra-info input {
            border-left: 2px solid var(--sage);
            background: rgba(107, 144, 128, 0.04);
        }

        .consent-row {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 18px 20px;
            background: rgba(107, 144, 128, 0.05);
            border: 1px solid rgba(107, 144, 128, 0.18);
            border-radius: 18px;
        }

        .consent-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            min-width: 20px;
            accent-color: var(--sage);
            cursor: pointer;
        }

        .btn-continuar {
            width: 100%;
            margin-top: 22px;
            padding: 18px;
            background: linear-gradient(135deg, #7ba891 0%, #4a6e5c 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(74, 110, 92, 0.28);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-continuar:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.38);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .loading .spinner { display: block; }
        .loading .btn-text { opacity: 0.7; }
    </style>
</head>
<body>

    <img src="img/logo.png" class="page-logo" alt="Espacio Mimar T">

    <div class="page-header">
        <p class="page-eyebrow">Registro inicial</p>
        <h1 class="page-title">Historia clínica</h1>
        <div class="page-divider"></div>
    </div>

    <div class="form-shell">

        <div class="form-section">
            <p class="section-eyebrow">Identificacion</p>
            <h2 class="section-title">Datos personales</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre y apellido <span class="req">*</span></label>
                    <input id="nombre" class="req" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label>Edad</label>
                    <input id="edad" type="number" placeholder="Ej: 32">
                </div>
                <div class="form-group full">
                    <label>Telefono</label>
                    <input id="telefono" placeholder="Ej: +549...">
                </div>
            </div>
        </div>

        <div class="form-section">
            <p class="section-eyebrow">Objetivo del tratamiento</p>
            <h2 class="section-title">¿Qué queres mejorar?</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Zona principal <span class="req">*</span></label>
                    <select id="zona">
                        <option>Rostro</option>
                        <option>Abdomen</option>
                        <option>Piernas</option>
                        <option>Glúteos</option>
                        <option>Otra</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Objetivo principal <span class="req">*</span></label>
                    <textarea id="objetivo" class="req" maxlength="200" placeholder="Ej: mejorar la textura de la piel..."></textarea>
                </div>
            </div>
        </div>

        <div class="form-section">
            <p class="section-eyebrow">Antecedentes</p>
            <h2 class="section-title">Salud general</h2>
            <div class="form-grid">
                <div class="form-group full">
                    <label>¿Tiene alguna enfermedad diagnosticada?</label>
                    <select id="enfermedad" onchange="toggleExtra('enfermedad', this.value)">
                        <option>No</option>
                        <option>Sí</option>
                    </select>
                    <div id="extra-enfermedad" class="extra-info">
                        <input id="det-enfermedad" placeholder="¿Cuál enfermedad?">
                    </div>
                </div>
                <div class="form-group full">
                    <label>¿Toma medicación actualmente?</label>
                    <select id="medicacion" onchange="toggleExtra('medicacion', this.value)">
                        <option>No</option>
                        <option>Sí</option>
                    </select>
                    <div id="extra-medicacion" class="extra-info">
                        <input id="det-medicacion" placeholder="Nombre de la medicación">
                    </div>
                </div>
                <div class="form-group full">
                    <label>¿Tiene alergias?</label>
                    <select id="alergias" onchange="toggleExtra('alergias', this.value)">
                        <option>No</option>
                        <option>Sí</option>
                    </select>
                    <div id="extra-alergias" class="extra-info">
                        <input id="det-alergias" placeholder="¿A qué es alérgica?">
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <p class="section-eyebrow">Antecedentes</p>
            <h2 class="section-title">Ginecológicos</h2>
            <div class="form-grid">
                <div class="form-group full">
                    <label>¿Hijos?</label>
                    <select id="hijos" onchange="toggleExtra('hijos', this.value)">
                        <option>No</option>
                        <option>Sí</option>
                    </select>
                    <div id="extra-hijos" class="extra-info">
                        <input id="det-hijos" type="number" placeholder="¿Cuántos?">
                    </div>
                </div>
                <div class="form-group full">
                    <label>¿Está embarazada?</label>
                    <select id="embarazo">
                        <option>No</option>
                        <option>Sí</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="consent-row">
                <input type="checkbox" id="consent">
                <label for="consent">Declaro que la información brindada es verdadera y completa. Entiendo que será utilizada exclusivamente para mi tratamiento.</label>
            </div>
            <button id="btnContinuar" class="btn-continuar" disabled>
                <span class="btn-text">Continuar</span>
                <span class="spinner"></span>
            </button>
        </div>

    </div>

    <script type="module">
        import { db, doc, setDoc, updateDoc } from "/js/firebase-web.js";
        
        const dni = localStorage.getItem("clienteDNI");
        const checkConsent = document.getElementById("consent");
        const boton = document.getElementById("btnContinuar");

        window.toggleExtra = (id, val) => {
            const div = document.getElementById(`extra-${id}`);
            if(div) div.style.display = (val === "Sí") ? "block" : "none";
            validarFormulario();
        };

        function validarFormulario() {
            let ok = true;

            // 1. Validar inputs con clase .req (Obligatorios base)
            document.querySelectorAll('.req').forEach(inp => {
                const val = inp.value ? inp.value.trim() : "";
                if (val === "") ok = false;
            });

            // 2. Validar campos "Sí" que están visibles
            const extrasVisibles = document.querySelectorAll('.extra-info[style*="display: block"] input');
            extrasVisibles.forEach(inp => {
                const val = inp.value ? inp.value.trim() : "";
                if (val === "") ok = false;
            });

            // 3. Checkbox de consentimiento
            if (!checkConsent.checked) ok = false;

            boton.disabled = !ok;
        }

        // Listeners para validación en tiempo real
        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', validarFormulario);
            el.addEventListener('change', validarFormulario);
        });

        boton.addEventListener("click", async () => {
            if (!dni) {
                alert("Error: No se encontró el DNI del cliente.");
                return;
            }

            boton.disabled = true;
            boton.classList.add('loading');

            const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value : "";
            const getExtraVal = (selId, inpId) => getVal(selId) === "Sí" ? getVal(inpId) : "No";

            const datos = {
                nombre: getVal("nombre"),
                edad: getVal("edad"),
                telefono: getVal("telefono"),
                zona: getVal("zona"),
                objetivo: getVal("objetivo"),
                enfermedad: getExtraVal("enfermedad", "det-enfermedad"),
                medicacion: getExtraVal("medicacion", "det-medicacion"),
                alergias: getExtraVal("alergias", "det-alergias"),
                hijos: getExtraVal("hijos", "det-hijos"),
                embarazo: getVal("embarazo"),
                fechaRegistro: new Date()
            };

            try {
                // Guardar en historias
                await setDoc(doc(db, "historias", dni), datos);
                // Actualizar flag en el cliente
                await updateDoc(doc(db, "clients", dni), { historiaCompletada: true });
                
                window.location.href = "servicios-pro.html";
            } catch (e) {
                console.error("Error Firebase:", e);
                alert("Error al guardar. Verifica tu conexión e intenta de nuevo.");
                boton.disabled = false;
                boton.classList.remove('loading');
            }
        });
    </script>
    <script src="/js/shared-footer.js"></script>
    <script src="/js/mimi-bot.js"></script>
</body>
</html>
