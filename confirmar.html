<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Turno | Espacio Mimar T</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde:     #72bd99;
            --verde-osc: #4f9777;
            --fondo:     #f2f6f4;
            --ink:       #273630;
            --muted:     #67736e;
            --border:    #d9e5de;
            --card-sh:   0 16px 38px rgba(29,51,42,0.11);
            --radius:    22px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 8% 15%, rgba(114,189,153,0.18), transparent 38%),
                radial-gradient(circle at 90% 8%,  rgba(114,189,153,0.12), transparent 32%),
                var(--fondo);
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            padding: 24px 16px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: linear-gradient(165deg, #fffdf9 0%, #f6fbf7 52%, #eef5ef 100%);
            border-radius: var(--radius);
            box-shadow: var(--card-sh);
            border: 1px solid rgba(208,174,115,0.38);
            padding: 32px 28px;
            text-align: center;
            animation: fadeUp .38s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-logo {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 18px;
            display: block;
            border: 1px solid rgba(90,144,119,0.18);
            box-shadow: 0 10px 22px rgba(41,66,56,0.12);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1.4rem, 3.5vw, 1.75rem);
            color: #2a4338;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .details-box {
            background: rgba(255,255,255,0.85);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 22px;
            text-align: left;
        }

        .details-box p {
            margin: 0 0 10px;
            font-size: 0.88rem;
            color: var(--muted);
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(217,229,222,0.6);
        }

        .details-box p:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

        .details-box strong {
            display: block;
            font-size: 0.98rem;
            font-weight: 700;
            color: var(--ink);
            margin-top: 2px;
        }

        /* Seccion duo - visible solo cuando el admin habilito ese slot */
        #duoSection {
            display: none;
            background: linear-gradient(135deg, #f5f9f6 0%, #ebf5ef 100%);
            border: 1.5px solid rgba(114,189,153,0.45);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 22px;
            text-align: left;
        }

        .duo-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: #2a4338;
            margin-bottom: 5px;
        }

        .duo-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .duo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .duo-grid label {
            font-size: 11px;
            font-weight: 700;
            color: var(--verde-osc);
            text-transform: uppercase;
            letter-spacing: .06em;
            display: block;
            margin-bottom: 4px;
        }

        .duo-grid input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            color: var(--ink);
            background: #fff;
            outline: none;
            transition: border-color .18s;
        }

        .duo-grid input:focus { border-color: var(--verde); }

        .btn-confirmar {
            width: 100%;
            background: linear-gradient(135deg, #7ba891 0%, #4a6e5c 100%);
            color: white;
            border: none;
            padding: 17px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(74,110,92,0.28);
            transition: transform .2s ease, box-shadow .2s ease;
            letter-spacing: .06em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-confirmar:not(:disabled):hover  { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(74,110,92,0.34); }
        .btn-confirmar:active { transform: translateY(0); }
        .btn-confirmar:disabled {
            background: linear-gradient(135deg, #b8c8c2 0%, #96aba4 100%);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            opacity: 0.7;
        }

        .btn-confirmar .spinner-btn {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.38);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spinBtn 0.7s linear infinite;
            flex-shrink: 0;
        }

        .btn-confirmar.loading .spinner-btn { display: block; }
        .btn-confirmar.loading .btn-label   { opacity: 0.72; }

        @keyframes spinBtn { to { transform: rotate(360deg); } }

        #statusMsg {
            margin-top: 14px;
            font-size: 0.82rem;
            color: var(--verde-osc);
            min-height: 1.2rem;
            font-weight: 600;
            line-height: 1.5;
        }

        #statusMsg.error { color: #c0392b; }

        /* Modal exito */
        #modalOk {
            position: fixed;
            inset: 0;
            background: rgba(15,22,19,0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: linear-gradient(165deg, #fffdf9 0%, #f6fbf7 100%);
            border: 1px solid rgba(208,174,115,0.38);
            padding: 32px 28px;
            border-radius: var(--radius);
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 24px 50px rgba(15,22,19,0.22);
            animation: fadeUp .28s ease both;
        }

        .modal-content h2 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.6rem;
            color: var(--verde-osc);
            margin-bottom: 12px;
        }

        .modal-content p {
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        @media (max-width: 420px) {
            .card       { padding: 24px 18px; }
            .duo-grid   { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="card">
    <img src="img/logo.png" alt="Espacio Mimar T" class="card-logo">
    <h1>Confirmar Reserva</h1>

    <div class="details-box">
        <p>Servicio <strong id="lblServicio">-</strong></p>
        <p>Fecha    <strong id="lblFecha">-</strong></p>
        <p>Hora     <strong id="lblHora">-</strong></p>
    </div>

    <div id="duoSection">
        <div class="duo-header">Sesion Duo</div>
        <div class="duo-sub">Este horario esta configurado para dos pacientes. Completa los datos de ambos para continuar.</div>
        <div class="duo-grid">
            <div>
                <label>Nombre paciente 1</label>
                <input type="text" id="duoNombre1" placeholder="Nombre completo" oninput="validarDuo()">
            </div>
            <div>
                <label>DNI paciente 1</label>
                <input type="text" id="duoDni1" placeholder="12345678" inputmode="numeric" oninput="validarDuo()">
            </div>
            <div>
                <label>Nombre paciente 2</label>
                <input type="text" id="duoNombre2" placeholder="Nombre completo" oninput="validarDuo()">
            </div>
            <div>
                <label>DNI paciente 2</label>
                <input type="text" id="duoDni2" placeholder="12345678" inputmode="numeric" oninput="validarDuo()">
            </div>
        </div>
    </div>

    <button id="btnEjecutar" class="btn-confirmar" disabled>
        <span class="btn-label">Confirmar Reserva</span>
        <span class="spinner-btn"></span>
    </button>
    <div id="statusMsg"></div>
</div>

<div id="modalOk">
    <div class="modal-content">
        <h2>Reserva confirmada</h2>
        <p>Tu turno fue registrado. Te vamos a avisar por WhatsApp.</p>
        <button class="btn-confirmar" onclick="window.location.href='index.html'">Finalizar</button>
    </div>
</div>

<script type="module">
import {
    db, doc, getDoc, collection, query, where, getDocs,
    runTransaction, serverTimestamp
} from "/js/firebase-web.js";

// ── Endpoints ────────────────────────────────────────────────────────────────
const CF_CONFIRMAR_URL = "https://us-central1-estetica-8d067.cloudfunctions.net/enviarConfirmacionTurno";

// ── Referencias DOM ───────────────────────────────────────────────────────────
const btn    = document.getElementById("btnEjecutar");
const status = document.getElementById("statusMsg");
const duoSec = document.getElementById("duoSection");

// ── Datos de sesion ───────────────────────────────────────────────────────────
const nombre   = localStorage.getItem("clienteNombre")        || "Paciente";
const dni      = localStorage.getItem("clienteDNI")           || "";
const servicio = localStorage.getItem("servicioSeleccionado") || "Tratamiento";
const fecha    = localStorage.getItem("fechaSeleccionada")    || "";
const hora     = localStorage.getItem("horaSeleccionada")     || "";

// Mostrar datos en pantalla
document.getElementById("lblServicio").textContent = servicio;
document.getElementById("lblFecha").textContent    = fecha;
document.getElementById("lblHora").textContent     = hora ? hora + " hs" : "-";

// ── Estado duo ────────────────────────────────────────────────────────────────
let esDuo = false;

// Verifica si el admin marco este slot como Sesion Duo
async function verificarModoDuo() {
    if (!fecha || !hora) { btn.disabled = false; return; }
    try {
        const snap = await getDocs(
            query(
                collection(db, "calendarExceptions"),
                where("fecha", "==", fecha),
                where("hora",  "==", hora),
                where("duo",   "==", true)
            )
        );
        if (!snap.empty) {
            esDuo = true;
            duoSec.style.display = "block";
            // El boton queda deshabilitado hasta que se completen todos los campos
        } else {
            esDuo = false;
            btn.disabled = false;
        }
    } catch (e) {
        console.warn("verificarModoDuo:", e.message);
        // Si falla la consulta, habilitar igualmente para no bloquear al paciente
        esDuo = false;
        btn.disabled = false;
    }
}

// Validacion en tiempo real del formulario duo
window.validarDuo = function () {
    if (!esDuo) return;
    const ok = ["duoNombre1","duoDni1","duoNombre2","duoDni2"]
        .every(id => document.getElementById(id).value.trim() !== "");
    btn.disabled = !ok;
};

// ── Helpers ───────────────────────────────────────────────────────────────────

// Obtiene telefono de un cliente por DNI desde Firestore
async function obtenerTelefono(dniCliente) {
    if (!dniCliente) return "";
    try {
        const snap = await getDoc(doc(db, "clients", String(dniCliente).replace(/\D/g, "")));
        if (snap.exists()) {
            const d = snap.data();
            return d.phone || d.telefono || d.whatsapp || "";
        }
    } catch (_) {}
    return "";
}

// Envia confirmacion via Cloud Function (plantilla turno_confirmado de Meta)
async function enviarConfirmacionWhatsApp({ telefono, nombrePaciente, dniPaciente }) {
    try {
        const resp = await fetch(CF_CONFIRMAR_URL, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nombre:   nombrePaciente,
                servicio: servicio,
                fecha:    fecha,
                hora:     hora + " hs",
                telefono: telefono || undefined,
                dni:      dniPaciente || undefined,
                descontarBalance: false
            })
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) console.warn("CF respuesta no-ok:", data);
    } catch (e) {
        console.warn("enviarConfirmacionWhatsApp:", e.message);
        // No bloquear el flujo si falla el envio de WA
    }
}

// ── Confirmar reserva ─────────────────────────────────────────────────────────
btn.addEventListener("click", async () => {
    btn.disabled = true;
    btn.classList.add("loading");
    status.className = "";
    status.textContent = "Verificando disponibilidad...";

    try {
        // Campos del documento de reserva
        const camposReserva = {
            clienteNombre: nombre,
            nombre:        nombre,
            dni:           dni,
            servicio:      servicio,
            fecha:         fecha,
            hora:          hora,
            estado:        "confirmado",
            timestamp:     serverTimestamp(),
            origen:        "paciente"
        };

        if (esDuo) {
            camposReserva.duo        = true;
            camposReserva.duoNombre1 = document.getElementById("duoNombre1").value.trim();
            camposReserva.duoDni1    = document.getElementById("duoDni1").value.trim();
            camposReserva.duoNombre2 = document.getElementById("duoNombre2").value.trim();
            camposReserva.duoDni2    = document.getElementById("duoDni2").value.trim();
        }

        // Referencia al slot - clave unica por fecha+hora
        const slotId  = `${fecha}_${hora.replace(":", "-")}`;
        const slotRef = doc(db, "reservas_slots", slotId);

        // Transaccion atomica: verifica y reserva en un solo paso
        await runTransaction(db, async (tx) => {
            const slotSnap = await tx.get(slotRef);
            const ocupantes = slotSnap.exists() ? (slotSnap.data().ocupantes || 0) : 0;
            const capacidad = esDuo ? 2 : 1;

            if (ocupantes >= capacidad) {
                throw new Error("SLOT_OCUPADO");
            }

            // Crear la reserva con ID generado del lado del cliente
            const reservaRef = doc(collection(db, "reservas"));
            tx.set(reservaRef, camposReserva);

            // Actualizar el contador del slot
            tx.set(slotRef, {
                fecha,
                hora,
                ocupantes: ocupantes + 1,
                ocupado:   (ocupantes + 1) >= capacidad,
                updatedAt: serverTimestamp()
            }, { merge: true });
        });

        status.textContent = "Enviando confirmacion...";

        // Notificaciones por WhatsApp (no bloquean el flujo)
        const telPrincipal = localStorage.getItem("clientePhoneIngresado") || await obtenerTelefono(dni);
        await enviarConfirmacionWhatsApp({ telefono: telPrincipal, nombrePaciente: nombre, dniPaciente: dni });

        if (esDuo) {
            const dni2 = document.getElementById("duoDni2").value.trim();
            const nom2 = document.getElementById("duoNombre2").value.trim();
            const tel2 = await obtenerTelefono(dni2);
            await enviarConfirmacionWhatsApp({ telefono: tel2, nombrePaciente: nom2, dniPaciente: dni2 });
        }

        document.getElementById("modalOk").style.display = "flex";

    } catch (e) {
        if (e.message === "SLOT_OCUPADO") {
            status.className  = "error";
            status.textContent = "Este horario fue reservado en este momento por otro paciente. Por favor, selecciona otro.";
        } else {
            console.error("confirmar:", e);
            status.className  = "error";
            status.textContent = "Hubo un error al guardar la reserva. Intentalo de nuevo.";
        }
        btn.disabled = false;
        btn.classList.remove("loading");
    }
});

// ── Iniciar ───────────────────────────────────────────────────────────────────
verificarModoDuo();
</script>
</body>
</html>
