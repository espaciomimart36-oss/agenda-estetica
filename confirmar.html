<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confirmar Turno | Espacio Mimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root{ --verde-mimar:#72bd99; --verde-oscuro:#3f8f6f; --verde-fondo:#e8f5ee; }
        body{ margin:0; background:#f4f7f6; font-family:'Montserrat',sans-serif; color:#2c3e3a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box;}
        .card{ background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .logo{ width: 180px; margin-bottom: 20px; }
        h2{ font-family: 'Playfair Display', serif; color: var(--verde-oscuro); margin-bottom: 25px; }
        .detalle-reserva{ text-align: left; background: var(--verde-fondo); padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #d1eadd; }
        .item{ margin-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
        .item:last-child{ border: none; }
        .label{ font-size: 12px; color: #777; text-transform: uppercase; font-weight: 600; display: block; }
        .valor{ font-size: 16px; color: var(--verde-oscuro); font-weight: 600; }
        .boton-confirmar{ width: 100%; padding: 18px; background: var(--verde-mimar); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .boton-confirmar:disabled{ background: #ccc; cursor: not-allowed; }
        .link-volver{ display: block; margin-top: 20px; color: #999; text-decoration: none; font-size: 14px; }

        /* MODAL ÉXITO */
        .modal-exito { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:999; backdrop-filter: blur(4px); }
        .modal-content { background:white; padding:40px 20px; border-radius:20px; text-align:center; width:90%; max-width:400px; }
        .modal-content h3 { color: var(--verde-oscuro); font-family: 'Playfair Display', serif; }
        .btn-cerrar { background: var(--verde-mimar); color:white; border:none; padding:15px 30px; border-radius:10px; margin-top:20px; cursor:pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <img src="img/logo.png" class="logo">
        <h2>Confirma tu turno</h2>
        
        <div class="detalle-reserva">
            <div class="item">
                <span class="label">Servicio</span>
                <span class="valor" id="servicioTexto">Cargando...</span>
            </div>
            <div class="item">
                <span class="label">Día</span>
                <span class="valor" id="fechaTexto">Cargando...</span>
            </div>
            <div class="item">
                <span class="label">Horario</span>
                <span class="valor" id="horaTexto">Cargando...</span>
            </div>
        </div>

        <button id="btnConfirmar" class="boton-confirmar">Confirmar y Finalizar</button>
        <a href="fecha.html" class="link-volver">Modificar fecha</a>
    </div>

    <div id="modalConfirmado" class="modal-exito">
        <div class="modal-content">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <h3>¡Turno Reservado!</h3>
            <p>Tu reserva se realizó con éxito. Te enviamos los detalles por WhatsApp.</p>
            <button class="btn-cerrar" id="btnFinalizar">Finalizar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        // --- CONFIGURACIÓN WHATSAPP ---
        const WHATSAPP_TOKEN = "EAAMzA3ngIUkBQ630dPYUcq6NBWPoybtHpMw8KbMEqTzv49lsAXW9honZCnblqcVdlxltSO35kXQc42D8P6dNwgx2YN4JWxpCwUxoZAziQVyK5jZArVQYaL63CZChQNZCdZBppqIEymvfBbZCsrdBJbXnUnlpdj06DSpYorrgnkmZCJ4wda6M3pQEdIh1PRHOfwZDZD";
        const PHONE_NUMBER_ID = "995248997010108";
        // ------------------------------

        const firebaseConfig = { projectId: "estetica-8d067", apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const servicio = localStorage.getItem("servicioSeleccionado") || "";
        const fechaRaw = localStorage.getItem("fechaSeleccionada") || "";
        const horaRaw = localStorage.getItem("horaSeleccionada") || "";
        const dniUsuario = localStorage.getItem("clienteDNI") || "";
        const duracion = parseInt(localStorage.getItem("duracionSeleccionada")) || 60;

        const horaLimpia = horaRaw.replace(" hs","").trim();
        const [year, month, day] = fechaRaw.split("-");
        const fechaObj = new Date(year, month - 1, day); 
        const fechaBonita = fechaObj.toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" });

        document.getElementById("servicioTexto").innerText = servicio;
        document.getElementById("fechaTexto").innerText = fechaBonita.charAt(0).toUpperCase() + fechaBonita.slice(1);
        document.getElementById("horaTexto").innerText = horaLimpia + " hs";

        const boton = document.getElementById("btnConfirmar");

        boton.onclick = async function(){
            boton.disabled = true;
            boton.innerText = "Procesando...";

            try {
                // 1. VALIDAR DISPONIBILIDAD
                const snap = await getDocs(query(collection(db,"reservas"), where("fecha","==",fechaRaw), where("hora","==",horaLimpia)));
                if(!snap.empty){
                    alert("Este horario se ocupó recién.");
                    window.location.href = "fecha.html";
                    return;
                }

                // 2. DATOS DEL CLIENTE
                const clientRef = doc(db, "clients", dniUsuario);
                const snapClient = await getDoc(clientRef);
                const data = snapClient.data();

                // --- LÓGICA DE LIMPIEZA DE TELÉFONO (VERSIÓN PRO) ---
                let nro = (data.telefono || data.phone || "").toString().replace(/\D/g, '');
                if (nro.startsWith("0")) nro = nro.substring(1);
                if (nro.startsWith("54")) nro = nro.substring(2);
                if (nro.startsWith("9")) nro = nro.substring(1);
                
                // Si tiene 12 dígitos es porque quedó un "15" en el medio
                if (nro.length === 12 && (nro.includes("15", 2) || nro.includes("15", 3) || nro.includes("15", 4))) {
                    nro = nro.replace("15", "");
                }
                // Estandarizar a 549 + 10 dígitos
                if (nro.length === 10) nro = "549" + nro;
                else if (!nro.startsWith("549")) nro = "549" + nro;
                // ---------------------------------------------------

                const finalNombre = data.nombre || data.fullName || "Cliente";
                const saldoActual = data.hoursBalance || 0;
                const descuento = duracion / 60;

                if (saldoActual < descuento) {
                    alert("Saldo insuficiente.");
                    boton.disabled = false;
                    boton.innerText = "Confirmar y Finalizar";
                    return;
                }

                // 3. GUARDAR EN FIRESTORE
                const nombreID = finalNombre.replace(/\s+/g, '_');
                const customID = `${nombreID}_${fechaRaw}_${horaLimpia.replace(':','')}`;

                await setDoc(doc(db, "reservas", customID), {
                    fecha: fechaRaw,
                    hora: horaLimpia,
                    duracion: duracion,
                    dni: dniUsuario,
                    servicio: servicio,
                    clienteNombre: finalNombre,
                    telefono: nro,
                    timestamp: new Date()
                });

                await updateDoc(clientRef, { hoursBalance: saldoActual - descuento });

                // 4. DISPARAR WHATSAPP DIRECTO
                try {
                    await fetch(`https://graph.facebook.com/v18.0/${PHONE_NUMBER_ID}/messages`, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${WHATSAPP_TOKEN}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            messaging_product: "whatsapp",
                            to: nro,
                            type: "template",
                            template: {
                                name: "confirmacion_turno",
                                language: { code: "es_AR" },
                                components: [{
                                    type: "body",
                                    parameters: [
                                        { type: "text", text: finalNombre },
                                        { type: "text", text: servicio },
                                        { type: "text", text: fechaBonita },
                                        { type: "text", text: horaLimpia + " hs" }
                                    ]
                                }]
                            }
                        })
                    });
                } catch(e) { console.error("Error WhatsApp:", e); }

                document.getElementById("modalConfirmado").style.display = "flex";

            } catch(error) {
                console.error("Error general:", error);
                boton.disabled = false;
                boton.innerText = "Confirmar y Finalizar";
            }
        };

        document.getElementById("btnFinalizar").onclick = function() {
            localStorage.removeItem("servicioSeleccionado");
            localStorage.removeItem("fechaSeleccionada");
            localStorage.removeItem("horaSeleccionada");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
