<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Turno - Espacio Mimar T</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 10px; text-align: left; margin-bottom: 20px; border-left: 4px solid #72bd99; }
        .btn-confirmar { background-color: #72bd99; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        .btn-confirmar:disabled { background-color: #ccc; }
        #modalConfirmado { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; color: white; flex-direction: column; z-index: 1000; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Confirmá tu turno</h2>
        <div class="info-box">
            <p><strong>CLIENTE:</strong> <span id="txtNombre">Cargando...</span></p>
            <p><strong>SERVICIO:</strong> <span id="txtServicio">Cargando...</span></p>
            <p><strong>DÍA:</strong> <span id="txtFecha">Cargando...</span></p>
            <p><strong>HORA:</strong> <span id="txtHora">Cargando...</span></p>
        </div>
        <button id="btnConfirmar" class="btn-confirmar" onclick="procesarConfirmacion()">Confirmar y Enviar WhatsApp</button>
    </div>

    <div id="modalConfirmado">
        <h1>¡Listo! ✅</h1>
        <p>Turno confirmado y notificación enviada.</p>
        <button onclick="window.location.href='index.html'" style="margin-top:20px; padding:10px 20px; cursor:pointer;">Volver</button>
    </div>

    <script>
        const WHATSAPP_TOKEN = "EAAMzA3ngIUkBRMpXw5ZBCCzVCFZAum3yF3dcHlgOPZAigiAIXERNfxpGfq21VCEgiByPN5xhm9mZBUyJ0WWqTl0xoB8ZBEs8EEh2FVC82aDHizTv0bKvMrcH7mkO99svZCMymZAi07nnmnBZCeHlI8XdnMBfJI1pnjVFWQZCdCIOBZA8fDa71OuvkVZCJu5bTR91wZDZD";
        const PHONE_NUMBER_ID = "995248997010108";
        
        // DATOS DE LA PLANTILLA SEGÚN TU CAPTURA
        const TEMPLATE_NAME = "turno_confirmado"; 
        const TEMPLATE_LANG = "en"; // Importante: figura como English en tu Meta Business

        const turnoData = {
            nombre: localStorage.getItem("clienteNombre") || "Cliente",
            telefono: "5493757671229", // El número que ya verificamos
            servicio: localStorage.getItem("servicioSeleccionado") || "Corporal",
            fecha: "28 de marzo",
            hora: "17:00"
        };

        document.getElementById("txtNombre").innerText = turnoData.nombre;
        document.getElementById("txtServicio").innerText = turnoData.servicio;
        document.getElementById("txtFecha").innerText = turnoData.fecha;
        document.getElementById("txtHora").innerText = turnoData.hora;

        async function procesarConfirmacion() {
            const boton = document.getElementById("btnConfirmar");
            boton.disabled = true;
            boton.innerText = "Enviando...";

            const payload = {
                messaging_product: "whatsapp",
                to: turnoData.telefono,
                type: "template",
                template: {
                    name: TEMPLATE_NAME,
                    language: { code: TEMPLATE_LANG },
                    components: [{
                        type: "body",
                        parameters: [
                            { type: "text", text: turnoData.nombre },   // {{1}} Hola [Nombre]
                            { type: "text", text: turnoData.servicio }, // {{2}} Servicio: [Servicio]
                            { type: "text", text: turnoData.fecha },    // {{3}} Fecha: [Fecha]
                            { type: "text", text: turnoData.hora }      // {{4}} Hora: [Hora]
                        ]
                    }]
                }
            };

            try {
                const response = await fetch(`https://graph.facebook.com/v18.0/${PHONE_NUMBER_ID}/messages`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${WHATSAPP_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const resJson = await response.json();

                if (response.ok) {
                    document.getElementById("modalConfirmado").style.display = "flex";
                } else {
                    console.error("Error detallado:", resJson);
                    alert("Error: " + resJson.error.message);
                    boton.disabled = false;
                    boton.innerText = "Reintentar";
                }
            } catch (error) {
                alert("Fallo de red.");
                boton.disabled = false;
            }
        }
    </script>
</body>
</html>
