<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mimar T | Gestión Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #72bd99; --verde-oscuro: #3f8f6f; --rojo: #ff4d4d; --azul: #4a90e2; --texto: #2c3e3a; --whatsapp: #25D366; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; margin: 0; color: var(--texto); padding-bottom: 50px; }
        
        /* LOGIN */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { font-family: 'Playfair Display', serif; color: var(--verde-oscuro); margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-entrar { width: 100%; padding: 15px; background: var(--verde); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 16px; }

        /* NAVEGACIÓN */
        .header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .menu-nav { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-nav { padding: 8px 20px; border: 1px solid #eee; background: white; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; }
        .btn-nav.active { background: var(--verde); color: white; border-color: var(--verde); }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; }
        .section.active { display: block; }
        #admin-content { display: none; }

        /* CALENDARIO */
        .calendar-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
        .day-name { font-size: 10px; color: #aaa; font-weight: 600; text-transform: uppercase; padding-bottom: 5px; }
        .day { padding: 12px 5px; border-radius: 10px; font-size: 13px; cursor: pointer; border: 1px solid #f8f8f8; background: white; transition: 0.2s; }
        .day.has-reserva { background: #fff0f0; border: 1.5px solid var(--rojo); color: var(--rojo); font-weight: 600; }
        .day.selected { background: var(--verde) !important; color: white !important; }

        /* CARDS */
        .detalle-dia-card { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; border-top: 4px solid var(--verde); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; margin-top: 10px; }
        .btn-save { width: 100%; background: var(--verde); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 5px; }

        /* BOTONES WHATSAPP */
        .grid-acciones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .btn-ws { border: none; padding: 10px 5px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; color: white; text-align: center; }
        .btn-confirmar { background: var(--whatsapp); }
        .btn-recordar { background: var(--azul); }
        .btn-cancelar { background: var(--rojo); }

        .busc-input { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .tag-fecha { background: #eee; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; color: #666; }

        /* TOAST */
        #toast-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 999999; pointer-events: none; }
        .toast { background: rgba(114, 189, 153, 0.9); color: white; padding: 15px 30px; border-radius: 25px; font-weight: 600; opacity: 0; transition: 0.4s; }
        .toast.show { opacity: 1; }
        
        /* EXPORT */
        .btn-export-main { background: var(--verde-oscuro); color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: 600; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Acceso Mimar T</h2>
            <input type="text" id="userAdmin" placeholder="Usuario">
            <input type="password" id="passAdmin" placeholder="Contraseña">
            <button class="btn-entrar" id="btnEntrarSeguro">Ingresar</button>
            <p id="error-login" style="color:red; font-size:13px; margin-top:10px; display:none;">Incorrecto</p>
        </div>
    </div>

    <div id="admin-content">
        <div id="toast-container"></div>
        <div class="header">
            <h2 style="font-family:'Playfair Display'; margin:0; color:var(--verde-oscuro)">Gimena Knack | Panel</h2>
            <div class="menu-nav">
                <button class="btn-nav active" id="btn-agenda" onclick="navegar('agenda')">📅 Agenda</button>
                <button class="btn-nav" id="btn-historias" onclick="navegar('historias')">📁 Historias</button>
                <button class="btn-nav" id="btn-buscar" onclick="navegar('buscar')">🔍 Buscar</button>
                <button class="btn-nav" id="btn-export" onclick="navegar('export')">📄 Exportar</button>
                <button class="btn-nav" onclick="cerrarSesion()">Salir</button>
            </div>
        </div>

        <div class="container">
            <div id="sec-agenda" class="section active">
                <div class="calendar-container">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button onclick="cambiarMes(-1)" style="border:none; background:none; cursor:pointer;">◀</button>
                        <h3 id="monthTitle" style="font-family:'Playfair Display'; margin:0; text-transform: capitalize;"></h3>
                        <button onclick="cambiarMes(1)" style="border:none; background:none; cursor:pointer;">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
                <div id="panelDetalleDia"></div>
            </div>

            <div id="sec-historias" class="section">
                <input type="text" class="busc-input" id="inpBusHistorias" placeholder="Buscar paciente o DNI..." oninput="filtrarHistorias()">
                <div id="contenedorHistorias"></div>
            </div>

            <div id="sec-buscar" class="section">
                <input type="text" class="busc-input" id="inpBusReservas" placeholder="Nombre del paciente..." oninput="filtrarReservas()">
                <div id="contenedorBusqueda"></div>
            </div>

            <div id="sec-export" class="section">
                <div class="detalle-dia-card">
                    <h3 style="margin-top:0">Reportes de Reservas</h3>
                    <p style="font-size:14px; color:#666">Descarga todas las reservas registradas en formato CSV para abrir en Excel.</p>
                    <button class="btn-export-main" onclick="exportarCSV()">📥 Descargar Todo (.csv)</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew", projectId: "estetica-8d067" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CREDENCIALES = { usuario: "GimenaAdmin", clave: "Mimar2026" };

        document.getElementById("btnEntrarSeguro").addEventListener("click", () => {
            if (document.getElementById("userAdmin").value === CREDENCIALES.usuario && document.getElementById("passAdmin").value === CREDENCIALES.clave) {
                sessionStorage.setItem("mimar_auth", "true");
                validarAcceso();
            } else { document.getElementById("error-login").style.display = "block"; }
        });

        window.cerrarSesion = () => { sessionStorage.removeItem("mimar_auth"); location.reload(); };

        function validarAcceso() {
            if (sessionStorage.getItem("mimar_auth") === "true") {
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("admin-content").style.display = "block";
                cargarTodo();
            }
        }

        let fechaActual = new Date();
        let todasLasReservas = [];
        let todasLasHistorias = [];

        async function cargarTodo() {
            const [snapR, snapH] = await Promise.all([getDocs(collection(db, "reservas")), getDocs(collection(db, "historias"))]);
            todasLasReservas = snapR.docs.map(d => ({ id: d.id, ...d.data() }));
            todasLasHistorias = snapH.docs.map(d => ({ id: d.id, ...d.data() }));
            renderCalendario();
            renderHistorias(todasLasHistorias);
        }

        window.enviarW = (tel, nombre, fecha, hora, servicio, accion) => {
            const f = fecha.split('-').reverse().join('/');
            let msj = "";
            if(accion === 'confirmar') msj = `Hola ${nombre}, te confirmo tu turno para ${servicio} el día ${f} a las ${hora} hs.`;
            if(accion === 'recordar') msj = `Hola ${nombre}, te recordamos tu turno de hoy ${f} a las ${hora} hs.`;
            if(accion === 'cancelar') msj = `Hola ${nombre}, lamentamos informarte que debemos cancelar tu turno del ${f}.`;
            const num = tel.replace(/\D/g, '');
            window.open(`https://wa.me/${num.startsWith('54') ? num : '54' + num}?text=${encodeURIComponent(msj)}`, '_blank');
        };

        window.verTurnos = (f, el) => {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            if(el) el.classList.add('selected');
            const filtrados = todasLasReservas.filter(r => r.fecha === f).sort((a,b) => a.hora.localeCompare(b.hora));
            document.getElementById("panelDetalleDia").innerHTML = filtrados.length ? filtrados.map(r => `
                <div class="detalle-dia-card">
                    <b>${r.clienteNombre || r.nombre || 'Sin nombre'}</b> - ${r.hora} hs<br>
                    <small>${r.servicio || 'Servicio'}</small>
                    <textarea id="n-${r.id}">${r.detalleSesion || ''}</textarea>
                    <button class="btn-save" onclick="guardarN('${r.id}')">Guardar Nota</button>
                    <div class="grid-acciones">
                        <button class="btn-ws btn-confirmar" onclick="enviarW('${r.phone || r.telefono || ''}','${r.clienteNombre || r.nombre}','${r.fecha}','${r.hora}','${r.servicio}','confirmar')">Confirmo</button>
                        <button class="btn-ws btn-recordar" onclick="enviarW('${r.phone || r.telefono || ''}','${r.clienteNombre || r.nombre}','${r.fecha}','${r.hora}','${r.servicio}','recordar')">Recordar</button>
                        <button class="btn-ws btn-cancelar" onclick="enviarW('${r.phone || r.telefono || ''}','${r.clienteNombre || r.nombre}','${r.fecha}','${r.hora}','${r.servicio}','cancelar')">Cancelar</button>
                    </div>
                </div>`).join('') : '<p style="text-align:center; opacity:0.5">Sin turnos.</p>';
        };

        window.filtrarReservas = () => {
            const txt = document.getElementById("inpBusReservas").value.toLowerCase();
            const contenedor = document.getElementById("contenedorBusqueda");
            if(txt.length < 2) { contenedor.innerHTML = ''; return; }
            const filtradas = todasLasReservas.filter(r => (r.clienteNombre || r.nombre || "").toLowerCase().includes(txt)).sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            contenedor.innerHTML = filtradas.map(r => `
                <div class="detalle-dia-card">
                    <span class="tag-fecha">${r.fecha.split('-').reverse().join('/')}</span>
                    <b>${r.clienteNombre || r.nombre}</b> - ${r.servicio || 'Servicio'}
                </div>`).join('');
        };

        window.renderHistorias = (datos) => {
            document.getElementById("contenedorHistorias").innerHTML = datos.map(h => `
                <div class="detalle-dia-card" style="border-top-color: var(--azul)">
                    <b>${h.nombre || 'Sin nombre'}</b> (DNI: ${h.dni || '-'})<br>
                    <div style="font-size: 12px; margin-top: 5px; color: #555;">
                        <strong>Medicación:</strong> ${h.medicacion || 'No'}<br>
                        <strong>Enfermedad:</strong> ${h.enfermedad || 'No'}<br>
                        <strong>Objetivo:</strong> ${h.objetivo || '-'}
                    </div>
                </div>`).join('');
        };

        window.filtrarHistorias = () => {
            const txt = document.getElementById("inpBusHistorias").value.toLowerCase();
            renderHistorias(todasLasHistorias.filter(h => h.nombre?.toLowerCase().includes(txt) || h.dni?.toString().includes(txt)));
        };

        window.exportarCSV = () => {
            let csv = "Fecha,Hora,Nombre,Servicio,Telefono,Nota\n";
            todasLasReservas.sort((a,b) => new Date(a.fecha) - new Date(b.fecha)).forEach(r => {
                csv += `${r.fecha},${r.hora},${r.clienteNombre || r.nombre},${r.servicio},${r.phone || r.telefono || ''},"${r.detalleSesion || ''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `reservas_mimar_t_${new Date().toLocaleDateString()}.csv`);
            link.click();
        };

        window.renderCalendario = () => {
            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";
            ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa', 'Do'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
            const mes = fechaActual.getMonth(); const año = fechaActual.getFullYear();
            document.getElementById("monthTitle").innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(fechaActual);
            const primerDia = (new Date(año, mes, 1).getDay() + 6) % 7; const diasMes = new Date(año, mes + 1, 0).getDate();
            for (let i = 0; i < primerDia; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= diasMes; d++) {
                const fStr = `${año}-${String(mes + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const tiene = todasLasReservas.some(r => r.fecha === fStr);
                const div = document.createElement("div"); div.className = `day ${tiene ? 'has-reserva' : ''}`;
                div.innerText = d; div.onclick = () => verTurnos(fStr, div); grid.appendChild(div);
            }
        };

        window.guardarN = async (id) => { await updateDoc(doc(db, "reservas", id), { detalleSesion: document.getElementById(`n-${id}`).value }); mostrarAviso("✅ Nota guardada"); cargarTodo(); };
        window.mostrarAviso = (m) => { const c = document.getElementById("toast-container"); const t = document.createElement("div"); t.className = "toast show"; t.innerText = m; c.appendChild(t); setTimeout(() => { t.classList.remove("show"); setTimeout(() => c.removeChild(t), 400); }, 3000); };
        window.cambiarMes = (n) => { fechaActual.setMonth(fechaActual.getMonth() + n); renderCalendario(); };
        window.navegar = (s) => { document.querySelectorAll('.section, .btn-nav').forEach(x => x.classList.remove('active')); document.getElementById(`sec-${s}`).classList.add('active'); document.getElementById(`btn-${s}`).classList.add('active'); };
        validarAcceso();
    </script>
</body>
</html>
