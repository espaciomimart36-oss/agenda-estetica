<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6f8a6d">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <title>Admin Mimar T | Gestión Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #f4fbf7; --texto: #2f5a47; --accento: #4ea37f; --accento-oscuro: #2f7c5d; --verde: #72bd99; --verde-oscuro: #3f8f6f; --azul: #4a90e2; --rojo: #e05252; --whatsapp: #25D366; --suave: #dff3ea; --suave-oscuro: #bfe6d5; --nude: #f7fffb; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(180deg, #f8fdfb 0%, #edf8f3 100%); margin: 0; color: var(--texto); padding-bottom: 50px; font-size: 15px; line-height: 1.45; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .login-box h2 { font-family: 'Playfair Display', serif; color: var(--accento-oscuro); margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #d5eadf; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-entrar { width: 100%; padding: 15px; background: var(--accento); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 16px; }
        .header { background: #fff; padding: 14px 16px; text-align: center; border-bottom: 1px solid #dceee5; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
        .menu-nav { margin-top: 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .btn-nav { padding: 10px 18px; min-height: 40px; border: 1px solid #cfe9dd; background: #fff; border-radius: 999px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; color: var(--texto); }
        .btn-nav.active { background: #e9f7f0; color: var(--accento-oscuro); border-color: #a9d9c3; }
        .container { max-width: 1024px; margin: 18px auto; padding: 0 16px; }
        .section { display: none; }
        .section.active { display: block; }
        #admin-content { display: none; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }
        .kpi-card { background: #fff; border: 1px solid #d9eee4; border-radius: 14px; padding: 12px; box-shadow: 0 6px 14px rgba(72,133,106,0.08); }
        .kpi-label { font-size: 11px; color: #6a8e7f; font-weight: 700; text-transform: uppercase; }
        .kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--verde-oscuro); }
        .calendar-container { background: #fff; border-radius: 22px; padding: 18px; box-shadow: 0 10px 25px rgba(63,143,111,0.12); border: 1px solid #d7ebe2; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; margin-top: 15px; }
        .day { padding: 10px 4px; border-radius: 12px; font-size: 13px; cursor: pointer; border: 1px solid #dbeee6; background: #fff; }
        .select-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #d1e7dc; }
        @media (max-width: 760px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Acceso Mimar T</h2>
            <input type="text" id="userAdmin" placeholder="Email admin">
            <input type="password" id="passAdmin" placeholder="Contraseña">
            <button class="btn-entrar" id="btnEntrarSeguro">Ingresar</button>
            <p id="error-login" style="color:red; font-size:13px; margin-top:10px; display:none;">No autorizado</p>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <h2 style="font-family:'Playfair Display'; margin:0; color:var(--verde-oscuro)">Gimena Knack | Panel</h2>
            <div class="menu-nav">
                <button class="btn-nav active" id="btn-agenda" onclick="navegar('agenda')">📅 Agenda</button>
                <button class="btn-nav" id="btn-historias" onclick="navegar('historias')">📁 Historias</button>
                <button class="btn-nav" id="btn-clientes" onclick="navegar('clientes')">🧾 Pacientes</button>
                <button class="btn-nav" onclick="cerrarSesion()">Salir</button>
            </div>
        </div>

        <div class="container">
            <div id="sec-agenda" class="section active">
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-label">Reservas</div><div class="kpi-value" id="kpi-total">0</div></div>
                    <div class="kpi-card"><div class="kpi-label">Turnos hoy</div><div class="kpi-value" id="kpi-hoy">0</div></div>
                </div>
                <div class="calendar-container">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button onclick="cambiarMes(-1)">◀</button>
                        <h3 id="monthTitle" style="text-transform: capitalize;"></h3>
                        <button onclick="cambiarMes(1)">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>

            <div id="sec-historias" class="section">
                <h3>Historias Clínicas</h3>
                <div id="contenedorHistorias"></div>
            </div>

            <div id="sec-clientes" class="section">
                <h3>Nuevo Paciente</h3>
                <input id="cliFullName" class="select-input" type="text" placeholder="Nombre completo">
                <input id="cliDni" class="select-input" type="text" placeholder="DNI">
                <button class="btn-entrar" onclick="guardarCliente()">Guardar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew",
            authDomain: "estetica-8d067.firebaseapp.com",
            projectId: "estetica-8d067"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- FUNCIONES GLOBALES (Asignadas a window para que los botones las vean) ---
        window.navegar = (sectionId) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(`sec-${sectionId}`).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
        };

        window.cerrarSesion = () => signOut(auth);

        window.cambiarMes = (v) => {
            fechaVisual.setMonth(fechaVisual.getMonth() + v);
            renderCalendario();
        };

        window.guardarCliente = async () => {
            const dni = document.getElementById('cliDni').value;
            const nombre = document.getElementById('cliFullName').value;
            if(!dni || !nombre) return alert("Completa los campos");
            try {
                await setDoc(doc(db, "clients", dni), { fullName: nombre, dni: dni, activo: true });
                alert("Paciente guardado con éxito");
            } catch(e) { alert("Error al guardar"); }
        };

        // --- LÓGICA DE LOGIN ---
        document.getElementById('btnEntrarSeguro').onclick = async () => {
            const email = document.getElementById('userAdmin').value;
            const pass = document.getElementById('passAdmin').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                document.getElementById('error-login').style.display = 'block';
            }
        };

        onAuthStateChanged(auth, (user) => {
            const adminEmail = "espaciomimart36@gmail.com";
            if (user && user.email === adminEmail) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                renderCalendario();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        // --- CALENDARIO ---
        let fechaVisual = new Date();
        function renderCalendario() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('monthTitle');
            if(!grid) return;
            grid.innerHTML = '';
            
            const year = fechaVisual.getFullYear();
            const month = fechaVisual.getMonth();
            title.innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(fechaVisual);

            const primerDia = new Date(year, month, 1).getDay();
            const diasMes = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < (primerDia === 0 ? 6 : primerDia - 1); i++) {
                grid.innerHTML += '<div></div>';
            }

            for (let d = 1; d <= diasMes; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = d;
                grid.appendChild(dayEl);
            }
        }
    </script>
</body>
</html>
