<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Gimena Knack</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --verde: #72bd99; --rojo: #ff4d4d; --texto: #2c3e3a; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; margin: 0; color: var(--texto); }
        
        .header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        /* --- FICHA ESTILO LISTA VERTICAL --- */
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        .card h3 { margin: 0; font-family: 'Playfair Display', serif; color: var(--verde); font-size: 24px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .dni-text { font-size: 12px; color: #aaa; margin: 10px 0 20px 0; display: block; }

        /* Datos en vertical */
        .data-list { display: flex; flex-direction: column; gap: 12px; }
        .data-item { display: flex; justify-content: space-between; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; font-size: 14px; }
        .data-item b { color: #555; font-weight: 600; }
        
        .alerta { color: var(--rojo); font-weight: bold; }
        .objetivo-seccion { margin-top: 20px; background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #f0f0f0; font-size: 14px; }

        /* Botón de exportar individual */
        .btn-export { 
            width: 100%; margin-top: 20px; padding: 12px; background: var(--texto); color: white; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-export:hover { background: #000; }

        /* Estilo para que el PDF salga prolijo */
        .pdf-header { display: none; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-family:'Playfair Display'; margin:0;">Gimena Knack | Admin</h2>
    </div>

    <div class="container">
        <div id="listaHistorias">Cargando fichas de pacientes...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew", projectId: "estetica-8d067" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.cargarHistorias = async () => {
            const div = document.getElementById("listaHistorias");
            try {
                const snap = await getDocs(collection(db, "historias"));
                div.innerHTML = "";

                snap.forEach(doc => {
                    const p = doc.data();
                    const cardId = `ficha-${doc.id}`;
                    
                    const resaltar = (val) => (val && val.toLowerCase() !== "no") ? `<span class="alerta">${val}</span>` : "No";

                    const cardHtml = `
                        <div class="card" id="${cardId}">
                            <h3>${p.nombre || "Paciente sin nombre"}</h3>
                            <span class="dni-text">ID/DNI: ${doc.id} | Fecha: ${p.fechaRegistro || '--'}</span>
                            
                            <div class="data-list">
                                <div class="data-item"><b>Edad:</b> <span>${p.edad || '--'}</span></div>
                                <div class="data-item"><b>Teléfono:</b> <span>${p.telefono || '--'}</span></div>
                                <div class="data-item"><b>Zona:</b> <span>${p.zona || '--'}</span></div>
                                <div class="data-item"><b>Hijos:</b> <span>${resaltar(p.hijos)}</span></div>
                                <div class="data-item"><b>Embarazo:</b> <span>${resaltar(p.embarazo)}</span></div>
                                <div class="data-item"><b>Enfermedad:</b> <span>${resaltar(p.enfermedad)}</span></div>
                                <div class="data-item"><b>Alergias:</b> <span>${resaltar(p.alergias)}</span></div>
                                <div class="data-item"><b>Medicación:</b> <span>${resaltar(p.medicacion)}</span></div>
                            </div>

                            <div class="objetivo-seccion">
                                <b>Objetivo del Tratamiento:</b><br>
                                <p style="margin-top:8px; line-height:1.4;">${p.objetivo || "No especificado"}</p>
                            </div>

                            <button class="btn-export" onclick="exportarFicha('${cardId}', '${p.nombre}')">
                                📄 Exportar esta ficha a PDF
                            </button>
                        </div>
                    `;
                    div.innerHTML += cardHtml;
                });
            } catch (e) {
                div.innerHTML = "Error: " + e.message;
            }
        };

        // Función para exportar solo LA FICHA seleccionada
        window.exportarFicha = (id, nombre) => {
            const elemento = document.getElementById(id);
            // Clonamos para quitar el botón del PDF antes de generar
            const clon = elemento.cloneNode(true);
            clon.querySelector('.btn-export').remove();
            clon.style.boxShadow = "none";
            clon.style.border = "1px solid #eee";

            const opciones = {
                margin: 15,
                filename: `Ficha_${nombre.replace(/ /g, "_")}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opciones).from(clon).save();
        };

        cargarHistorias();
    </script>
</body>
</html>
