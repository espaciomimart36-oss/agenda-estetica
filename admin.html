<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mimar T | Gestión Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #72bd99; --verde-oscuro: #3f8f6f; --rojo: #ff4d4d; --azul: #4a90e2; --texto: #2c3e3a; --whatsapp: #25D366; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; margin: 0; color: var(--texto); padding-bottom: 50px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .menu-nav { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .btn-nav { padding: 8px 20px; border: 1px solid #eee; background: white; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; }
        .btn-nav.active { background: var(--verde); color: white; border-color: var(--verde); }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Estilos Calendario */
        .calendar-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 15px; }
        .day-name { font-size: 10px; color: #aaa; font-weight: 600; text-transform: uppercase; padding-bottom: 5px; }
        .day { padding: 12px 5px; border-radius: 10px; font-size: 13px; cursor: pointer; border: 1px solid #f8f8f8; background: white; transition: 0.2s; }
        .day.has-reserva { background: #fff0f0; border: 1.5px solid var(--rojo); color: var(--rojo); font-weight: 600; }
        .day.selected { background: var(--verde) !important; color: white !important; }

        /* Tarjetas de Turnos y Historias */
        .detalle-dia-card, .historia-card { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; border-top: 4px solid var(--verde); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .historia-card { border-top: none; border-left: 5px solid var(--verde); margin-top: 15px; }
        .historia-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 10px; }
        .dato-linea { font-size: 13px; margin-bottom: 5px; }
        .dato-label { font-weight: 600; color: var(--verde-oscuro); }

        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; background: #fdfdfd; margin-top: 10px; }
        .grid-acciones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .btn-save { width: 100%; background: var(--verde); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 5px; }
        .btn-ws { border: none; padding: 10px 5px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .btn-confirmar { background: var(--whatsapp); }
        .btn-recordar { background: var(--azul); }
        .btn-cancelar { background: var(--rojo); }
        .search-box { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-family:'Playfair Display'; margin:0; color:var(--verde-oscuro)">Gimena Knack | Panel</h2>
        <div class="menu-nav">
            <button class="btn-nav active" id="btn-agenda" onclick="navegar('agenda')">📅 Agenda</button>
            <button class="btn-nav" id="btn-historias" onclick="navegar('historias')">📁 Historias</button>
            <button class="btn-nav" id="btn-buscar" onclick="navegar('buscar')">🔍 Buscar</button>
        </div>
    </div>

    <div class="container">
        <div id="sec-agenda" class="section active">
            <div class="calendar-container">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button onclick="cambiarMes(-1)" style="border:none; background:none; cursor:pointer; font-size:18px;">◀</button>
                    <h3 id="monthTitle" style="font-family:'Playfair Display'; margin:0; text-transform: capitalize;"></h3>
                    <button onclick="cambiarMes(1)" style="border:none; background:none; cursor:pointer; font-size:18px;">▶</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
            <div id="panelDetalleDia"></div>
        </div>

        <div id="sec-historias" class="section">
            <h3 style="font-family:'Playfair Display'; color:var(--verde-oscuro);">Historias Clínicas</h3>
            <input type="text" id="filtroHistorias" class="search-box" placeholder="Filtrar por nombre o DNI..." onkeyup="filtrarFichas()">
            <div id="listaHistoriasReal"></div>
        </div>

        <div id="sec-buscar" class="section">
            <h3 style="font-family:'Playfair Display'; color:var(--verde-oscuro);">Buscar Turnos</h3>
            <input type="text" id="inputBusqueda" class="search-box" placeholder="🔍 Buscar por nombre o tratamiento..." onkeyup="filtrarTurnos()">
            <div id="resultadosBusqueda"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew", projectId: "estetica-8d067" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WHATSAPP_TOKEN = "EAAMzA3ngIUkBQ630dPYUcq6NBWPoybtHpMw8KbMEqTzv49lsAXW9honZCnblqcVdlxltSO35kXQc42D8P6dNwgx2YN4JWxpCwUxoZAziQVyK5jZArVQYaL63CZChQNZCdZBppqIEymvfBbZCsrdBJbXnUnlpdj06DSpYorrgnkmZCJ4wda6M3pQEdIh1PRHOfwZDZD";
        const PHONE_NUMBER_ID = "995248997010108"; 

        let fechaActual = new Date();
        let todasLasReservas = [];
        let mapaClientes = {};
        let todasLasHistorias = [];

        async function cargarTodo() {
            try {
                const snapC = await getDocs(collection(db, "clients"));
                mapaClientes = {};
                snapC.forEach(d => {
                    const c = d.data();
                    if(c.dni) mapaClientes[c.dni] = { nombre: c.fullName || c.nombre, tel: c.phone };
                });

                const snapR = await getDocs(collection(db, "reservas"));
                todasLasReservas = [];
                snapR.forEach(d => {
                    const r = d.data();
                    const info = mapaClientes[r.dni] || { nombre: r.clienteNombre || "Sin Nombre", tel: r.phone };
                    todasLasReservas.push({ id: d.id, ...r, nombreReal: info.nombre, telReal: info.tel });
                });
                renderCalendario();
            } catch (e) { console.error(e); }
        }

        // --- LÓGICA DE HISTORIAS (COLECCIÓN 'HISTORIAS') ---
        async function cargarSeccionHistorias() {
            const container = document.getElementById("listaHistoriasReal");
            container.innerHTML = "<p style='text-align:center;'>Cargando historias...</p>";
            try {
                const snapH = await getDocs(collection(db, "historias"));
                todasLasHistorias = [];
                snapH.forEach(docSnap => {
                    todasLasHistorias.push({ dni: docSnap.id, ...docSnap.data() });
                });
                renderHistorias(todasLasHistorias);
            } catch (e) { container.innerHTML = "Error al cargar."; }
        }

        function renderHistorias(lista) {
            const container = document.getElementById("listaHistoriasReal");
            container.innerHTML = lista.map(h => `
                <div class="historia-card">
                    <div class="historia-header">
                        <b style="font-size:16px; color:var(--verde-oscuro)">${h.nombre || 'Sin nombre'}</b>
                        <span style="font-size:11px; color:#888;">DNI: ${h.dni}</span>
                    </div>
                    <div class="dato-linea"><span class="dato-label">Objetivo:</span> ${h.objetivo || '-'}</div>
                    <div class="dato-linea"><span class="dato-label">Enfermedad:</span> ${h.enfermedad || 'No'}</div>
                    <div class="dato-linea"><span class="dato-label">Medicación:</span> ${h.medicacion || 'No'}</div>
                    <div class="dato-linea"><span class="dato-label">Hijos:</span> ${h.hijos || '0'}</div>
                    <div style="font-size:10px; color:#aaa; margin-top:10px; text-align:right;">${h.fechaRegistro || ''}</div>
                </div>
            `).join('');
        }

        window.filtrarFichas = () => {
            const term = document.getElementById("filtroHistorias").value.toLowerCase();
            const filtradas = todasLasHistorias.filter(h => h.nombre.toLowerCase().includes(term) || h.dni.includes(term));
            renderHistorias(filtradas);
        };

        // --- LÓGICA DE BÚSQUEDA DE TURNOS ---
        window.filtrarTurnos = () => {
            const term = document.getElementById("inputBusqueda").value.toLowerCase();
            const div = document.getElementById("resultadosBusqueda");
            if (term.length < 3) { div.innerHTML = ""; return; }
            const filtrados = todasLasReservas.filter(r => 
                r.nombreReal.toLowerCase().includes(term) || (r.servicio && r.servicio.toLowerCase().includes(term))
            );
            div.innerHTML = filtrados.map(r => renderTarjetaTurno(r)).join('');
        };

        function renderTarjetaTurno(r) {
            return `
                <div class="detalle-dia-card">
                    <span style="font-size:10px; background:#eee; padding:2px 6px; border-radius:4px;">${r.fecha}</span>
                    <b style="display:block; margin-top:5px;">${r.nombreReal}</b>
                    <small>${r.servicio || 'Tratamiento'} | ${r.hora} hs</small>
                    <textarea id="n-${r.id}" placeholder="Notas de la sesión...">${r.detalleSesion || ''}</textarea>
                    <button class="btn-save" onclick="guardarN('${r.id}')">Guardar Nota ✓</button>
                    <div class="grid-acciones">
                        <button class="btn-ws btn-confirmar" onclick="enviarW('${r.telReal}', '${r.nombreReal}', '${r.fecha}', '${r.hora}', '${r.servicio}', 'confirmar')"><span>✅</span><span>Conf.</span></button>
                        <button class="btn-ws btn-recordar" onclick="enviarW('${r.telReal}', '${r.nombreReal}', '${r.fecha}', '${r.hora}', '${r.servicio}', 'recordar')"><span>🔔</span><span>Rec.</span></button>
                        <button class="btn-ws btn-cancelar" onclick="enviarW('${r.telReal}', '${r.nombreReal}', '${r.fecha}', '${r.hora}', '${r.servicio}', 'cancelar')"><span>❌</span><span>Canc.</span></button>
                    </div>
                </div>`;
        }

        // --- CALENDARIO Y AGENDA ---
        function renderCalendario() {
            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";
            ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa', 'Do'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
            const mes = fechaActual.getMonth();
            const año = fechaActual.getFullYear();
            document.getElementById("monthTitle").innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(fechaActual);
            const primerDia = (new Date(año, mes, 1).getDay() + 6) % 7;
            const diasMes = new Date(año, mes + 1, 0).getDate();
            for (let i = 0; i < primerDia; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= diasMes; d++) {
                const fStr = `${año}-${String(mes + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const tiene = todasLasReservas.some(r => r.fecha === fStr);
                const div = document.createElement("div");
                div.className = `day ${tiene ? 'has-reserva' : ''}`;
                div.innerText = d;
                div.onclick = () => verTurnos(fStr, div);
                grid.appendChild(div);
            }
        }

        window.verTurnos = (f, el) => {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            const filtrados = todasLasReservas.filter(r => r.fecha === f).sort((a,b) => a.hora.localeCompare(b.hora));
            const panel = document.getElementById("panelDetalleDia");
            panel.innerHTML = filtrados.length ? filtrados.map(r => renderTarjetaTurno(r)).join('') : '<p style="text-align:center; opacity:0.4; margin-top:20px;">Sin turnos para hoy</p>';
        };

        // --- FUNCIONES COMUNES ---
        window.enviarW = async (tel, nombre, fecha, hora, servicio, accion) => {
            if(!tel) return alert("No hay teléfono.");
            let num = tel.toString().replace(/\D/g, "");
            if (!num.startsWith("54")) num = "549" + num;
            const [y, m, d] = fecha.split('-');
            const fechaLinda = `${d}/${m}`;
            let template = (accion==='confirmar') ? "turno_confirmado" : (accion==='recordar') ? "recordatorio_de_cita" : "turno_cancelado";
            let lang = (accion==='confirmar') ? "en" : (accion==='recordar') ? "es" : "es_AR";

            try {
                await fetch(`https://graph.facebook.com/v21.0/${PHONE_NUMBER_ID}/messages`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${WHATSAPP_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messaging_product: "whatsapp", to: num, type: "template",
                        template: { name: template, language: { code: lang }, components: [{ type: "body", parameters: [{type:"text", text:nombre}, {type:"text", text:servicio||"Tratamiento"}, {type:"text", text:fechaLinda}, {type:"text", text:hora}]}] }
                    })
                });
                alert("✅ Mensaje enviado!");
            } catch (e) { alert("Error"); }
        };

        window.guardarN = async (id) => {
            const val = document.getElementById(`n-${id}`).value;
            await updateDoc(doc(db, "reservas", id), { detalleSesion: val });
            alert("Nota guardada");
        };

        window.navegar = (s) => {
            document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.btn-nav').forEach(x => x.classList.remove('active'));
            document.getElementById(`sec-${s}`).classList.add('active');
            document.getElementById(`btn-${s}`).classList.add('active');
            if(s === 'historias') cargarSeccionHistorias();
        };

        window.cambiarMes = (n) => { fechaActual.setMonth(fechaActual.getMonth() + n); renderCalendario(); };
        cargarTodo();
    </script>
</body>
</html>
