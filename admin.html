<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Espacio Mimar</title>
<link rel="stylesheet" href="style.css">

<script>
const isAdmin = localStorage.getItem("adminAuth");
if (isAdmin !== "true") {
window.location.href = "login-admin.html";
}
</script>

<style>

body{
background:#f4f7f6;
font-family:Arial;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.admin-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.btn-logout{
background:#72bd99;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.calendar{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
background:#f8f9fa;
border-radius:12px;
cursor:pointer;
}

.day.has-reservation{
background:#ffe3e3;
border:2px solid #ff7675;
color:#d63031;
font-weight:bold;
}

.reserva-card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
border-left:5px solid #d63031;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

textarea{
width:100%;
height:70px;
border-radius:10px;
border:1px solid #ddd;
padding:10px;
}

.btn-guardar{
margin-top:8px;
background:#72bd99;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.btn-cancel{
margin-top:8px;
background:#d63031;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.btn-historial{
margin-top:6px;
background:#eee;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.historial-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.historial-content{
background:white;
padding:25px;
border-radius:12px;
width:500px;
max-height:80vh;
overflow:auto;
}

.btn-pdf{
margin-top:10px;
background:#72bd99;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div class="container">

<div class="admin-header">
<h1>Panel Administrativo</h1>
<button id="btnLogout" class="btn-logout">Cerrar sesión</button>
</div>

<p>Bienvenida Gimena ✨</p>

<div class="calendar">
<div class="calendar-grid" id="calendarGrid"></div>
</div>

<div id="selectedDay" style="margin-top:30px;"></div>

</div>


<!-- MODAL HISTORIAL -->

<div id="historialModal" class="historial-modal">

<div class="historial-content">

<h3>Historial del cliente</h3>

<div id="historialBody"></div>

<button id="exportPDF" class="btn-pdf">Exportar PDF</button>

<br><br>

<button onclick="document.getElementById('historialModal').style.display='none'">
Cerrar
</button>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script type="module" src="js/admin.js"></script>

<script>
document.getElementById("btnLogout").onclick=function(){
localStorage.removeItem("adminAuth");
window.location.href="login-admin.html";
};
</script>

</body>
</html>
