<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Admin | Espacio Mimar</title>

<style>

body{
font-family:Arial;
background:#f4f7f6;
margin:0;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.header h1{
margin:0;
font-size:28px;
}

.header p{
color:#666;
margin-top:5px;
}

/* MENU */

.menu-admin{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}

.menu-admin button{
background:#72bd99;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

.menu-admin button:hover{
opacity:0.9;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* CALENDARIO */

.calendar{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

/* DIAS SEMANA */

.diasSemana{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
margin-bottom:10px;
font-weight:bold;
color:#666;
}

/* GRID DIAS */

.gridDias{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

/* DIA */

.day{
background:#f2f2f2;
padding:18px;
text-align:center;
border-radius:10px;
cursor:pointer;
transition:0.2s;
font-weight:bold;
}

.day:hover{
background:#e7f3ed;
}

/* DIA OCUPADO */

.day.ocupado{
background:#ffd6d6;
border:2px solid #ff6b6b;
}

/* TURNOS */

.turnos{
margin-top:25px;
}

.turno{
background:white;
border-left:4px solid #ff7675;
padding:15px;
margin-bottom:12px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.turno h2{
margin:0 0 5px 0;
font-size:18px;
}

.turno p{
margin:4px 0;
}

/* TEXTAREA */

textarea{
width:100%;
height:80px;
margin-top:10px;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
font-family:Arial;
}

/* BOTON GUARDAR */

button.guardar{
margin-top:10px;
background:#72bd99;
border:none;
padding:8px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* HISTORIAS */

#listaHistorias div{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:12px;
color:#aaa;
padding-bottom:30px;
text-align:center;
width:100%;
}

</style>

</head>

<body>

<script>

/* PROTECCIÓN SIMPLE ADMIN */

const password = prompt("Acceso administrador");

if(password !== "mimar2026"){

document.body.innerHTML="Acceso restringido";

}

</script>

<div class="header">

<h1>Panel Administrativo</h1>
<p>Bienvenida Gimena ✨</p>

<div class="menu-admin">

<button onclick="mostrarAgenda()">Agenda</button>
<button onclick="mostrarHistorias()">Historias clínicas</button>
<button onclick="cerrarSesion()">Cerrar sesión</button>

</div>

</div>


<div class="container">

<!-- PANEL AGENDA -->

<div id="agendaPanel">

<div class="calendar">

<!-- CALENDARIO GENERADO POR JS -->
<div id="agendaContainer"></div>

</div>

</div>


<!-- PANEL HISTORIAS -->

<div id="historiasPanel" style="display:none">

<h2>Historias clínicas</h2>

<div id="listaHistorias"></div>

</div>

</div>

<div class="footer">
© 2026 Espacio Mimar T — Todos los derechos reservados
</div>

<script type="module" src="./js/admin.js"></script>

<script>

function mostrarAgenda(){

document.getElementById("agendaPanel").style.display="block";
document.getElementById("historiasPanel").style.display="none";

}

function mostrarHistorias(){

document.getElementById("agendaPanel").style.display="none";
document.getElementById("historiasPanel").style.display="block";

}

function cerrarSesion(){

localStorage.clear();
window.location.href="index.html";

}

</script>

</body>
</html>
