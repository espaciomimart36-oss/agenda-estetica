<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="mobile-fixes.css">
<title>Confirmar Jornada | Espacio Mimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-700: #2f6f57;
            --green-600: #3f8f6f;
            --green-500: #61b18d;
            --green-100: #e7f5ee;
            --ink: #22332c;
            --muted: #5f746b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 85% 10%, rgba(97, 177, 141, 0.2), rgba(97, 177, 141, 0) 45%),
                radial-gradient(circle at 10% 90%, rgba(47, 111, 87, 0.16), rgba(47, 111, 87, 0) 42%),
                linear-gradient(135deg, #f8fffb 0%, #edf8f2 60%, #e6f3ec 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(63, 143, 111, 0.24);
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(38, 73, 58, 0.16);
            padding: 26px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.5rem;
            color: var(--green-700);
        }

        .summary {
            background: var(--green-100);
            border: 1px solid rgba(63, 143, 111, 0.26);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .summary p { margin: 6px 0; }
        .summary strong { color: var(--green-700); }

        .label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--green-700);
        }

        textarea {
            width: 100%;
            min-height: 84px;
            border-radius: 12px;
            border: 1px solid #b8d9c9;
            padding: 11px 12px;
            font: inherit;
            resize: vertical;
            background: #fafffc;
        }

        .hint {
            margin-top: 7px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .status {
            min-height: 20px;
            margin-top: 10px;
            color: var(--green-700);
            font-size: 0.92rem;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 13px 18px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            margin-top: 12px;
            background: linear-gradient(135deg, var(--green-500), var(--green-600));
            color: #fff;
            box-shadow: 0 12px 26px rgba(63, 143, 111, 0.34);
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .btn:hover:not(:disabled) { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.75; cursor: not-allowed; }

        #modalOk {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
        }

        .modal-card {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            text-align: center;
        }

        .modal-card h2 {
            margin-top: 0;
            color: var(--green-700);
        }

        .modal-card p {
            color: var(--ink);
            line-height: 1.45;
        }

        .btn-secondary {
            margin-top: 10px;
            background: #f0f6f3;
            color: var(--green-700);
            box-shadow: none;
            border: 1px solid #d3e8dd;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Confirmar turno de jornada</h1>
        <div class="summary">
            <p>Paciente: <strong id="txtNombre">Cargando...</strong></p>
            <p>Servicio: <strong id="txtServicio">Cargando...</strong></p>
            <p>Fecha y hora: <strong><span id="txtFecha">-</span> a las <span id="txtHora">-</span></strong></p>
        </div>

        <label class="label" for="telefonos">Numeros de WhatsApp para aviso</label>
        <textarea id="telefonos" placeholder="Ejemplo: 5491122334455, 5491166677788"></textarea>
        <div class="hint">Podes cargar uno o varios numeros separados por coma.</div>

        <div id="status" class="status"></div>
        <button id="btnConfirmar" class="btn" type="button">Confirmar y enviar aviso por WhatsApp</button>
    </div>

    <div id="modalOk">
        <div class="modal-card">
            <h2>Turno confirmado</h2>
            <p id="resultadoFinal">Reserva guardada correctamente.</p>
            <button class="btn" onclick="window.location.href='jornada.html'">Volver a jornada</button>
            <button class="btn btn-secondary" onclick="window.location.href='serviciosjornada.html'">Ver servicios de jornada</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "estetica-8d067",
            apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CF_CONFIRM_URL = "https://us-central1-estetica-8d067.cloudfunctions.net/enviarConfirmacionTurno";

        const dniLs = localStorage.getItem("clienteDNI") || "";
        const nombreLs = localStorage.getItem("clienteNombre") || localStorage.getItem("nombre") || "Cliente";
        const servicioLs = localStorage.getItem("servicioSeleccionado") || "Jornada Especial";
        const fechaLs = localStorage.getItem("fechaSeleccionada") || "Pendiente";
        const horaLs = localStorage.getItem("horaSeleccionada") || "00:00";
        const phoneFallback = (localStorage.getItem("clientePhoneIngresado") || "").trim();

        const txtNombre = document.getElementById("txtNombre");
        const txtServicio = document.getElementById("txtServicio");
        const txtFecha = document.getElementById("txtFecha");
        const txtHora = document.getElementById("txtHora");
        const telefonosEl = document.getElementById("telefonos");
        const statusEl = document.getElementById("status");
        const btnConfirmar = document.getElementById("btnConfirmar");

        txtNombre.innerText = nombreLs;
        txtServicio.innerText = servicioLs;
        txtFecha.innerText = fechaLs;
        txtHora.innerText = horaLs;

        const parseTelefonos = (raw) => {
            const lista = String(raw || "")
                .split(/[\n,;]+/)
                .map((v) => v.trim())
                .filter(Boolean);

            const unicos = [];
            const usado = new Set();
            for (const tel of lista) {
                const clave = tel.replace(/\s+/g, "");
                if (!clave || usado.has(clave)) continue;
                usado.add(clave);
                unicos.push(tel);
            }
            return unicos;
        };

        const setStatus = (msg) => {
            statusEl.textContent = msg || "";
        };

        async function cargarTelefonoSugerido() {
            if (!dniLs) {
                telefonosEl.value = phoneFallback;
                return;
            }

            try {
                const clienteRef = doc(db, "clients", dniLs);
                const clienteSnap = await getDoc(clienteRef);
                if (!clienteSnap.exists()) {
                    telefonosEl.value = phoneFallback;
                    return;
                }

                const c = clienteSnap.data() || {};
                const phone = (c.phone || c.telefono || c.whatsapp || "").toString().trim();
                telefonosEl.value = phone || phoneFallback;
            } catch (error) {
                console.error("Error cargando telefono sugerido:", error);
                telefonosEl.value = phoneFallback;
            }
        }

        async function enviarWhatsApp(destinos) {
            let ok = 0;
            let fail = 0;

            for (const telefono of destinos) {
                try {
                    const response = await fetch(CF_CONFIRM_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            nombre: nombreLs,
                            servicio: servicioLs,
                            fecha: fechaLs,
                            hora: `${horaLs} hs`,
                            telefono,
                            dni: dniLs
                        })
                    });

                    if (!response.ok) {
                        fail += 1;
                        continue;
                    }
                    ok += 1;
                } catch (error) {
                    console.error("Error enviando WhatsApp:", error);
                    fail += 1;
                }
            }

            return { ok, fail };
        }

        async function confirmarTurnoJornada() {
            btnConfirmar.disabled = true;
            btnConfirmar.textContent = "Procesando...";
            setStatus("");

            try {
                const telefonos = parseTelefonos(telefonosEl.value);
                const telefonoPrincipal = telefonos[0] || "";
                const turnoAt = new Date(`${fechaLs}T${horaLs}:00-03:00`);

                await addDoc(collection(db, "reservas"), {
                    cliente: nombreLs,
                    clienteNombre: nombreLs,
                    nombre: nombreLs,
                    title: nombreLs,
                    displayName: nombreLs,
                    phone: telefonoPrincipal,
                    telefono: telefonoPrincipal,
                    dni: dniLs,
                    servicio: servicioLs,
                    fecha: fechaLs,
                    hora: horaLs,
                    origen: "jornada",
                    turnoAt: Number.isNaN(turnoAt.getTime()) ? null : turnoAt,
                    recordatorios: {
                        h48: { enviado: false },
                        h24: { enviado: false },
                        h12: { enviado: false },
                        h6: { enviado: false }
                    },
                    timestamp: new Date()
                });

                if (dniLs) {
                    try {
                        await updateDoc(doc(db, "clients", dniLs), {
                            hoursBalance: increment(-1)
                        });
                    } catch (balanceError) {
                        console.error("No se pudo descontar hoursBalance:", balanceError);
                    }
                }

                let resumen = "Reserva guardada correctamente.";
                if (telefonos.length) {
                    setStatus("Enviando avisos por WhatsApp...");
                    const { ok, fail } = await enviarWhatsApp(telefonos);
                    resumen = `Reserva guardada. Avisos enviados: ${ok}. Avisos con error: ${fail}.`;
                } else {
                    resumen = "Reserva guardada. No se enviaron avisos porque no se cargaron numeros.";
                }

                document.getElementById("resultadoFinal").textContent = resumen;
                document.getElementById("modalOk").style.display = "flex";
            } catch (error) {
                console.error("Error confirmando jornada:", error);
                const detalle = error?.code || error?.message || "Error desconocido";
                setStatus(`No se pudo confirmar el turno: ${detalle}`);
                btnConfirmar.disabled = false;
                btnConfirmar.textContent = "Reintentar confirmacion";
                return;
            }

            btnConfirmar.disabled = false;
            btnConfirmar.textContent = "Confirmar y enviar aviso por WhatsApp";
            setStatus("");
        }

        await cargarTelefonoSugerido();
        btnConfirmar.addEventListener("click", confirmarTurnoJornada);
    </script>
</body>
</html>
