<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimena Knack | Confirmar jornada</title>
    
    <link rel="stylesheet" href="mobile-fixes.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red-700: #9f1024;
            --red-600: #cf1d35;
            --red-500: #ff5a5f;
            --red-100: #fff0f1;
            --ink: #331f22;
            --muted: #7b6165;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 85% 10%, rgba(255, 90, 95, 0.2), rgba(255, 90, 95, 0) 45%),
                radial-gradient(circle at 10% 90%, rgba(159, 16, 36, 0.16), rgba(159, 16, 36, 0) 42%),
                linear-gradient(135deg, #fff9fa 0%, #fff0f1 60%, #ffe8ea 100%);
            font-family: 'Montserrat', sans-serif;
            color: var(--ink);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(207, 29, 53, 0.24);
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(117, 18, 33, 0.16);
            padding: 26px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.5rem;
            color: var(--red-700);
        }

        .summary {
            background: var(--red-100);
            border: 1px solid rgba(207, 29, 53, 0.2);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .summary p { margin: 6px 0; }
        .summary strong { color: var(--red-700); }

        .label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--red-700);
        }

        textarea {
            width: 100%;
            min-height: 84px;
            border-radius: 12px;
            border: 1px solid #efc3c8;
            padding: 11px 12px;
            font: inherit;
            resize: vertical;
            background: #fffcfc;
        }

        .hint {
            margin-top: 7px;
            color: var(--muted);
            font-size: 0.86rem;
        }

        .status {
            min-height: 20px;
            margin-top: 10px;
            color: var(--red-700);
            font-size: 0.92rem;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 13px 18px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            margin-top: 12px;
            background: linear-gradient(135deg, var(--red-500), var(--red-600));
            color: #fff;
            box-shadow: 0 12px 26px rgba(159, 16, 36, 0.3);
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .btn:hover:not(:disabled) { transform: translateY(-1px); }
        .btn:disabled { opacity: 0.75; cursor: not-allowed; }

        #modalOk {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
        }

        .modal-card {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            text-align: center;
        }

        .modal-card h2 {
            margin-top: 0;
            color: var(--red-700);
        }

        .modal-card p {
            color: var(--ink);
            line-height: 1.45;
        }

        .btn-secondary {
            margin-top: 10px;
            background: #fff4f5;
            color: var(--red-700);
            box-shadow: none;
            border: 1px solid #f0d1d5;
        }

        @media (min-width: 1024px) {
            .card, .modal-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(14px);
            }
        }

        @media (max-width: 640px) {
            body { align-items: stretch; padding: 14px; }
            .card { margin: auto; padding: 20px 16px; border-radius: 18px; background: rgba(255, 255, 255, 0.97); }
            #modalOk { align-items: flex-end; }
            .modal-card { border-radius: 24px 24px 18px 18px; padding: 18px; }
        }
    </style>
    <link rel="stylesheet" href="/pro-theme.css">
</head>
<body>
    <div class="card">
        <h1>Confirmar turno de jornada</h1>
        <div class="summary">
            <p>Paciente: <strong id="txtNombre">Cargando...</strong></p>
            <p>Servicio: <strong id="txtServicio">Cargando...</strong></p>
            <p>Fecha y hora: <strong><span id="txtFecha">-</span> a las <span id="txtHora">-</span></strong></p>
        </div>

        <label class="label" for="telefonos">Números de WhatsApp para aviso</label>
        <textarea id="telefonos" placeholder="Ejemplo: 5491122334455, 5491166677788"></textarea>
        <div class="hint">Podes cargar uno o varios números separados por coma.</div>

        <div id="status" class="status"></div>
        <button id="btnConfirmar" class="btn" type="button">Confirmar y enviar aviso por WhatsApp</button>
    </div>

    <div id="modalOk">
        <div class="modal-card">
            <h2>Turno confirmado</h2>
            <p id="resultadoFinal">Reserva guardada correctamente.</p>
            <button class="btn" onclick="window.location.href='jornada.html'">Volver a jornada</button>
            <button class="btn btn-secondary" onclick="window.location.href='serviciosjornada.html'">Ver servicios de jornada</button>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, doc, getDoc, getDocs, query, where } from "/js/firebase-web.js";

        const CF_CONFIRM_URL = "https://us-central1-estetica-8d067.cloudfunctions.net/enviarConfirmacionTurno";

        const dniLs = localStorage.getItem("clienteDNI") || "";
        const nombreLs = localStorage.getItem("clienteNombre") || localStorage.getItem("nombre") || "Paciente";
        const servicioLs = localStorage.getItem("servicioSeleccionado") || "Jornada Especial";
        const fechaLs = localStorage.getItem("fechaSeleccionada") || "Pendiente";
        const horaLs = localStorage.getItem("horaSeleccionada") || "00:00";
        const phoneFallback = (localStorage.getItem("clientePhoneIngresado") || "").trim();

        const txtNombre = document.getElementById("txtNombre");
        const txtServicio = document.getElementById("txtServicio");
        const txtFecha = document.getElementById("txtFecha");
        const txtHora = document.getElementById("txtHora");
        const telefonosEl = document.getElementById("telefonos");
        const statusEl = document.getElementById("status");
        const btnConfirmar = document.getElementById("btnConfirmar");

        const formatearFechaVisible = (fecha) => {
            if (!fecha) return fecha;
            const [year, month, day] = fecha.split("-").map(Number);
            const parsed = new Date(year, (month || 1) - 1, day || 1);
            if (Number.isNaN(parsed.getTime())) return fecha;
            return new Intl.DateTimeFormat("es-AR", { day: "numeric", month: "long", year: "numeric" }).format(parsed);
        };

        txtNombre.innerText = nombreLs;
        txtServicio.innerText = servicioLs;
        txtFecha.innerText = formatearFechaVisible(fechaLs);
        txtHora.innerText = horaLs;

        const parseTelefonos = (raw) => {
            const lista = String(raw || "").split(/[\n,;]+/).map((v) => v.trim()).filter(Boolean);
            const unicos = [];
            const usado = new Set();
            for (const tel of lista) {
                const clave = tel.replace(/\s+/g, "");
                if (!clave || usado.has(clave)) continue;
                usado.add(clave);
                unicos.push(tel);
            }
            return unicos;
        };

        const setStatus = (msg) => { statusEl.textContent = msg || ""; };

        async function cargarTelefonoSugerido() {
            if (!dniLs) {
                telefonosEl.value = phoneFallback;
                return;
            }
            try {
                const clienteRef = doc(db, "clients", dniLs);
                const clienteSnap = await getDoc(clienteRef);
                if (!clienteSnap.exists()) {
                    telefonosEl.value = phoneFallback;
                    return;
                }
                const c = clienteSnap.data() || {};
                const phone = (c.phone || c.telefono || c.whatsapp || "").toString().trim();
                telefonosEl.value = phone || phoneFallback;
            } catch (error) {
                console.error("Error cargando telefono:", error);
                telefonosEl.value = phoneFallback;
            }
        }

        async function ejecutarConfirmacionBackend({ telefono = "", descontarBalance = false, omitirWhatsapp = false }) {
            try {
                const response = await fetch(CF_CONFIRM_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nombre: nombreLs,
                        servicio: servicioLs,
                        fecha: fechaLs,
                        hora: `${horaLs} hs`,
                        telefono,
                        dni: dniLs,
                        descontarBalance,
                        omitirWhatsapp
                    })
                });
                const data = await response.json().catch(() => ({}));
                return { ok: response.ok, data };
            } catch (error) {
                return { ok: false, error };
            }
        }

        async function enviarWhatsApp(destinos) {
            let ok = 0;
            let fail = 0;
            const warnings = new Set();

            for (const [index, telefono] of destinos.entries()) {
                const resultado = await ejecutarConfirmacionBackend({
                    telefono,
                    descontarBalance: index === 0 && !!dniLs,
                    omitirWhatsapp: false
                });

                if (!resultado.ok) {
                    if (index === 0 && dniLs) warnings.add("balance_update_failed");
                    fail += 1;
                    continue;
                }

                (resultado.data?.warnings || []).forEach((w) => warnings.add(w));
                if (resultado.data?.whatsappSent) ok += 1;
                else fail += 1;
            }
            return { ok, fail, warnings: Array.from(warnings) };
        }

        async function confirmarTurnoJornada() {
            btnConfirmar.disabled = true;
            btnConfirmar.textContent = "Procesando...";
            setStatus("");

            try {
                const telefonos = parseTelefonos(telefonosEl.value);
                const telefonoPrincipal = telefonos[0] || "";
                const turnoAt = new Date(`${fechaLs}T${horaLs}:00-03:00`);

                // Verificar que el horario no esté bloqueado por admin
                const blkSnap = await getDocs(query(
                    collection(db, "calendarExceptions"),
                    where("fecha", "==", fechaLs),
                    where("hora",  "==", horaLs)
                ));
                const esBloqueado = blkSnap.docs.some(d => {
                    const bd = d.data();
                    return bd.active !== false && (bd.type === "blocked" || bd.blocked === true);
                });
                if (esBloqueado) {
                    setStatus("Este horario no está disponible. Por favor, volvé y elegí otro.");
                    btnConfirmar.disabled = false;
                    btnConfirmar.textContent = "Confirmar turno";
                    return;
                }

                await addDoc(collection(db, "reservas"), {
                    cliente: nombreLs,
                    phone: telefonoPrincipal,
                    dni: dniLs,
                    servicio: servicioLs,
                    fecha: fechaLs,
                    hora: horaLs,
                    origen: "jornada",
                    turnoAt: Number.isNaN(turnoAt.getTime()) ? null : turnoAt,
                    status: "confirmado",
                    estado: "confirmado",
                    reminderSent: false,
                    recordatorios: {
                        h48: { enviado: false },
                        h24: { enviado: false },
                        h12: { enviado: false },
                        h6: { enviado: false }
                    },
                    timestamp: new Date()
                });

                let resumen = "Turno confirmado.";
                if (telefonos.length) {
                    setStatus("Enviando avisos por WhatsApp...");
                    const { ok, warnings } = await enviarWhatsApp(telefonos);
                    resumen = ok > 0 ? "Mensaje enviado." : "Turno confirmado.";
                    if (warnings.some(w => w.includes("balance"))) console.warn("Revisar balance:", warnings);
                } else {
                    await ejecutarConfirmacionBackend({ descontarBalance: !!dniLs, omitirWhatsapp: true });
                    resumen = "Turno confirmado.";
                }

                document.getElementById("resultadoFinal").textContent = resumen;
                document.getElementById("modalOk").style.display = "flex";
            } catch (error) {
                console.error("Error:", error);
                setStatus(`Error: ${error.message}`);
                btnConfirmar.disabled = false;
                btnConfirmar.textContent = "Reintentar confirmación";
            }
        }

        await cargarTelefonoSugerido();
        btnConfirmar.addEventListener("click", confirmarTurnoJornada);
    </script>
    <script src="/js/shared-footer.js"></script>
    <script src="/js/mimi-bot.js"></script>
</body>
</html>
