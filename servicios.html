<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios | Espacio Mimar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Tratamientos</h2>

<div id="listaServicios">
Cargando servicios...
</div>

</div>

<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
query,
where,
orderBy,
getDocs
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const container=document.getElementById("listaServicios");

async function cargarServicios(){

const q=query(
collection(db,"services"),
where("activo","==",true),
orderBy("orden")
);

const snap=await getDocs(q);

container.innerHTML="";

let categorias={};

snap.forEach(doc=>{

const data=doc.data();

if(!categorias[data.categoria]){
categorias[data.categoria]=[];
}

categorias[data.categoria].push({
id:doc.id,
...data
});

});

for(const catName in categorias){

const h=document.createElement("div");
h.className="categoria";
h.innerText=catName.toUpperCase();

container.appendChild(h);

categorias[catName].forEach(serv=>{

const div=document.createElement("div");
div.className="servicio";

div.innerHTML=`

<div class="servicio-titulo">
${serv.nombre}
<span>▼</span>
</div>

<div class="servicio-desc">

${serv.descripcion}

<button class="btn-reservar">
Reservar
</button>

</div>

`;

div.querySelector(".servicio-titulo").onclick=()=>{

const d=div.querySelector(".servicio-desc");

d.style.display=d.style.display==="block"?"none":"block";

};

div.querySelector(".btn-reservar").onclick=()=>{

window.location.href=
`fecha.html?sid=${serv.id}&servicio=${encodeURIComponent(serv.nombre)}`;

};

container.appendChild(div);

});

}

}

cargarServicios();

</script>

</body>
</html>
