<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios | Espacio Mimar</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f7f6;
font-family:'Montserrat',sans-serif;
}

/* HERO */

.hero{
width:100%;
height:200px;
background:url("img/cabina.jpeg") center center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

/* Capa de claridad sobre la imagen para que el verde oscuro resalte */
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(255, 255, 255, 0.3); /* Un velo blanco suave */
}

.hero h1{
position:relative;
z-index: 1;
font-family:'Playfair Display',serif;
color:#2c3e3a; /* Verde oscuro elegante */
font-size:48px;
letter-spacing:2px;
margin: 0;
text-shadow: 1px 1px 0px rgba(255,255,255,0.5); /* Sombra clara para legibilidad */
}

/* CONTENEDOR */

.container{
width:95%;
max-width:1600px;
margin:auto;
padding:40px;
text-align:center;
}

/* LOGO */

.logo{
width:380px;
margin-top:-60px;
margin-bottom:30px;
background:white;
padding:12px 30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
position: relative;
z-index: 2;
}

/* GRID SERVICIOS */

.servicios{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:35px;
}

/* CARD */

.servicio{
background:white;
border-radius:18px;
padding:35px;
box-shadow:0 12px 35px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:260px;
transition:.25s;
text-align:left;
}

.servicio:hover{
transform:translateY(-6px);
box-shadow:0 18px 40px rgba(0,0,0,0.12);
}

.servicio h3{
margin:0;
font-size:20px;
color:#2c3e3a;
}

.duracion{
margin-top:6px;
font-size:13px;
color:#72bd99;
font-weight:600;
}

.servicio p{
margin-top:15px;
font-size:15px;
color:#555;
line-height:1.6;
}

button{
margin-top:20px;
background:#72bd99;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
font-size:15px;
transition:.2s;
}

button:hover{
background:#63ab8a;
}

/* RESPONSIVE */

@media(max-width:1200px){
.servicios{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:600px){

.servicios{
grid-template-columns:1fr;
}

.hero{
height:160px;
}

.hero h1{
font-size:36px;
}

.logo{
width:260px;
}

}

</style>

</head>

<body>

<div class="hero">
<h1>Servicios</h1>
</div>

<div class="container">

<img src="img/logo.png" class="logo">

<div class="servicios" id="listaServicios"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew",
authDomain: "estetica-8d067.firebaseapp.com",
projectId: "estetica-8d067",
storageBucket: "estetica-8d067.firebasestorage.app",
messagingSenderId: "501220214938",
appId: "1:501220214938:web:af6e262c23d9a7ea853723",
measurementId: "G-J4NH9ENVYL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const contenedor = document.getElementById("listaServicios");

async function cargarServicios(){

const snapshot = await getDocs(collection(db,"services"));

let servicios = [];

snapshot.forEach((doc)=>{

const s = doc.data();

if(s.activo === true){
servicios.push(s);
}

});

servicios.sort((a,b)=>a.orden - b.orden);

servicios.forEach((s)=>{

const descripcion = s.descripcion ? s.descripcion : "";

const tarjeta=document.createElement("div");
tarjeta.className="servicio";

tarjeta.innerHTML=`

<div>

<h3>${s.nombre}</h3>

<div class="duracion">${s.duracion} min</div>

<p>${descripcion}</p>

</div>

<button onclick="reservar('${s.nombre}')">Reservar</button>

`;

contenedor.appendChild(tarjeta);

});

}

cargarServicios();

window.reservar=function(servicio){

localStorage.setItem("servicioSeleccionado",servicio);

window.location.href="fecha.html";

}

</script>

</body>
</html>
