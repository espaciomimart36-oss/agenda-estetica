<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elegir fecha | Espacio Mimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root{ --verde-mimar:#72bd99; --verde-oscuro:#3f8f6f; --verde-fondo:#e8f5ee; }
        *{ box-sizing: border-box; }
        body{ margin:0; background:#f4f7f6; font-family:'Montserrat',sans-serif; color:#2c3e3a; overflow-x: hidden; }
        .hero{ width:100%; display:flex; justify-content:center; position:relative; }
        .hero img{ width:100%; max-height:260px; object-fit:cover; }
        .container{ max-width:1050px; margin:auto; padding:20px; text-align:center; margin-top:-80px; position:relative; }
        .logo{ width:280px; max-width: 80%; margin-bottom:15px; display:block; margin-left:auto; margin-right:auto; }
        #saldoStatus{ font-weight:600; color:var(--verde-oscuro); background:var(--verde-fondo); display:inline-block; padding:10px 20px; border-radius:30px; margin-bottom:20px; border:1px solid var(--verde-mimar); font-size:13px; }
        .anuncio-scroll { width: 100%; overflow: hidden; background: white; border: 1px solid #e2f1ea; border-radius: 12px; padding: 12px 0; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); white-space: nowrap; }
        .anuncio-text { display: inline-block; padding-left: 100%; animation: scroll-text 35s linear infinite; color: var(--verde-oscuro); font-size: 13px; font-weight: 500; }
        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .calendario{ background:white; border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.08); margin-bottom:30px; width: 100%; }
        .mes{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-weight:600; }
        .mes button{ border:none; background:var(--verde-mimar); color:white; padding:8px 15px; border-radius:8px; cursor:pointer; }
        .semana{ display:grid; grid-template-columns:repeat(7, 1fr); margin-bottom:10px; font-weight:600; color:#666; font-size: 12px; }
        .grid{ display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
        .dia{ padding:12px 2px; border-radius:10px; background:#f1f1f1; cursor:pointer; transition:.2s; font-size: 13px; text-align: center; border: 2px solid transparent; }
        .seleccionado{ border:2px solid var(--verde-mimar) !important; background:var(--verde-fondo) !important; font-weight:bold; }
        .domingo, .pasado, .bloqueado{ background:#eee; color:#bbb; cursor:not-allowed; opacity:0.6; }
        .horarios{ display:grid; grid-template-columns:repeat(auto-fill, minmax(90px, 1fr)); gap:10px; margin-top:20px; }
        .hora{ background:white; border-radius:10px; padding:12px; cursor:pointer; border:1px solid #ddd; text-align:center; font-size: 14px; }
        .hora.selected{ background:var(--verde-mimar); color:white; }
        .hora.ocupado{ background:#eee; color:#bbb; cursor:not-allowed; text-decoration:line-through; border:none; }
        .boton{ width:100%; padding:18px; background:var(--verde-mimar); border:none; border-radius:12px; color:white; font-size:16px; cursor:pointer; font-weight:600; margin-top:20px; }
        .boton:disabled{ background:#ccc; }
        .modal-mimar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(4px); padding: 20px; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 400px; width: 100%; }
        .alerta-zonas { background: #fdf7e3; border: 1px solid #f1c40f; padding: 15px; border-radius: 12px; margin: 15px 0; color: #856404; font-size: 13px; text-align: left;}
    </style>
</head>
<body>
    <div class="hero"> <img src="img/fecha.jpeg"> </div>
    <div class="container">
        <img src="img/logo.png" class="logo">
        <div id="saldoStatus">Verificando balance...</div>
        <div class="anuncio-scroll">
            <div class="anuncio-text">🔔 <strong>Información:</strong> Turnos de 60 min. En <strong>Mio-Up</strong>, 12:00 o 20:00 (30 min) consumen 1 zona; resto consumen 2 zonas.</div>
        </div>
        <div class="calendario">
            <div class="mes">
                <button id="btnMesAnterior">◀</button>
                <div id="mes"></div>
                <button id="btnMesSiguiente">▶</button>
            </div>
            <div class="semana"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div>
            <div class="grid" id="dias"></div>
        </div>
        <div class="horarios" id="horarios"></div>
        <button class="boton" id="reservarBtn" disabled> Confirmar Reserva </button>
    </div>

    <div id="modalMimar" class="modal-mimar">
        <div class="modal-box">
            <h4 id="modalTitulo" style="font-family:'Playfair Display'; color:var(--verde-oscuro); margin-top:0;">Aviso</h4>
            <p id="modalMsg" style="font-size:14px;"></p>
            <div id="modalZonas" class="alerta-zonas" style="display:none;"></div>
            <button id="btnFinalizar" class="boton" style="margin-top:10px;">Entendido</button>
            <button id="btnCancelarModal" style="background:none; border:none; color:#777; margin-top:15px; cursor:pointer; font-size:13px;">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig={ projectId:"estetica-8d067", apiKey:"AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew" };
        const app=initializeApp(firebaseConfig);
        const db=getFirestore(app);

        let fechaActual=new Date();
        let fechaSeleccionada=null, horaSeleccionada=null, saldoActual=0, duracionTurno = 60;
        let excepciones = {};

        const hoy = new Date(); hoy.setHours(0,0,0,0);
        const dniUsuario = localStorage.getItem("clienteDNI") || "43154201";
        const servicioGuardado = localStorage.getItem("servicioSeleccionado") || "";
        const esMioUp = servicioGuardado.toLowerCase().includes("mio");

        async function cargarDatos() {
            const snap = await getDoc(doc(db,"clients",dniUsuario));
            if(snap.exists()) {
                saldoActual = snap.data().hoursBalance;
                document.getElementById("saldoStatus").innerText = `Tienes ${saldoActual} sesiones disponibles`;
            }
            const exSnap = await getDocs(collection(db, "calendarExceptions"));
            exSnap.forEach(doc => { if(doc.data().active) excepciones[doc.id] = doc.data().reason; });
            renderCalendario();
        }

        function renderCalendario(){
            const y = fechaActual.getFullYear(), m = fechaActual.getMonth();
            document.getElementById("mes").innerText = `${["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][m]} ${y}`;
            const contenedor = document.getElementById("dias");
            contenedor.innerHTML = "";
            const diasMes = new Date(y, m + 1, 0).getDate();
            const primerDia = new Date(y, m, 1).getDay();
            let offset = primerDia === 0 ? 6 : primerDia - 1;
            for(let i=0; i<offset; i++){ contenedor.appendChild(document.createElement("div")); }

            for(let d=1; d<=diasMes; d++){
                const fStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let f = new Date(y, m, d); f.setHours(0,0,0,0);
                let div = document.createElement("div");
                div.className = "dia"; div.innerText = d;
                if(f.getDay() === 0) div.classList.add("domingo");
                else if(f < hoy) div.classList.add("pasado");
                else if(excepciones[fStr]) {
                    div.classList.add("bloqueado");
                    div.onclick = () => mostrarAviso("Día Cerrado", `No habrá atención por: ${excepciones[fStr]}`);
                } else {
                    div.onclick = () => {
                        document.querySelectorAll(".dia").forEach(e=>e.classList.remove("seleccionado"));
                        div.classList.add("seleccionado");
                        fechaSeleccionada = f;
                        cargarHorarios(f, fStr);
                    };
                }
                contenedor.appendChild(div);
            }
        }

        async function cargarHorarios(fecha, fStr){
            const container = document.getElementById("horarios");
            container.innerHTML = "<p>Cargando...</p>";
            const nombreDia = ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"][fecha.getDay()];
            const docSnap = await getDoc(doc(db, "horarios", nombreDia));
            const snapRes = await getDocs(query(collection(db,"reservas"), where("fecha","==",fStr)));
            const ocupados = snapRes.docs.map(doc => doc.data().hora);
            container.innerHTML = "";
            if(docSnap.exists()){
                const bloques = docSnap.data().bloques || [];
                bloques.forEach(bloque => {
                    if (bloque.activo === false) return;
                    let [hI, mI] = bloque.inicio.split(':').map(Number);
                    let [hF, mF] = bloque.fin.split(':').map(Number);
                    let actual = hI * 60 + mI, fin = hF * 60 + mF;
                    let intervalo = (bloque.tipo === "fraccionado") ? 30 : 60;
                    while(actual < fin){
                        if(nombreDia === "viernes" && actual >= 1140) break;
                        let h = Math.floor(actual/60), m = actual%60;
                        let horaStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                        let div = document.createElement("div");
                        div.className = "hora"; div.innerText = horaStr;
                        if(ocupados.includes(horaStr)) div.classList.add("ocupado");
                        else {
                            div.onclick = () => {
                                horaSeleccionada = horaStr; duracionTurno = intervalo;
                                document.querySelectorAll(".hora").forEach(e=>e.classList.remove("selected"));
                                div.classList.add("selected"); document.getElementById("reservarBtn").disabled = false;
                            };
                        }
                        container.appendChild(div);
                        actual += intervalo;
                    }
                });
            }
        }

        function mostrarAviso(titulo, msg) {
            document.getElementById("modalTitulo").innerText = titulo;
            document.getElementById("modalMsg").innerHTML = msg;
            document.getElementById("modalZonas").style.display = "none";
            document.getElementById("btnFinalizar").innerText = "Entendido";
            document.getElementById("btnFinalizar").onclick = () => document.getElementById("modalMimar").style.display="none";
            document.getElementById("modalMimar").style.display = "flex";
        }

        async function ejecutarReserva(){
            const btn = document.getElementById("btnFinalizar");
            btn.disabled = true; btn.innerText = "Reservando...";
            const fStr = `${fechaSeleccionada.getFullYear()}-${String(fechaSeleccionada.getMonth()+1).padStart(2,'0')}-${String(fechaSeleccionada.getDate()).padStart(2,'0')}`;
            let descuento = (esMioUp && duracionTurno === 60) ? 2 : 1;
            
            // GUARDAR DATOS ANTES DE SALTAR
            localStorage.setItem("fechaSeleccionada", fStr);
            localStorage.setItem("horaSeleccionada", horaSeleccionada);
            localStorage.setItem("duracionSeleccionada", duracionTurno);

            await addDoc(collection(db,"reservas"),{ dni: dniUsuario, fecha: fStr, hora: horaSeleccionada, servicio: servicioGuardado });
            await updateDoc(doc(db,"clients",dniUsuario),{ hoursBalance: saldoActual - descuento });
            window.location.href="confirmar.html";
        }

        document.getElementById("reservarBtn").onclick = () => {
            if(esMioUp) {
                document.getElementById("modalTitulo").innerText = "Mio Up - Info";
                document.getElementById("modalMsg").innerText = "Confirmá tu turno de 30 o 60 min.";
                const zonas = document.getElementById("modalZonas");
                zonas.style.display = "block";
                zonas.innerHTML = duracionTurno === 60 ? "⚠️ Bloque de 1 hora: se usarán 2 zonas." : "✅ Bloque de 30 min: se usará 1 zona.";
                document.getElementById("btnFinalizar").innerText = "Confirmar";
                document.getElementById("btnFinalizar").onclick = ejecutarReserva;
                document.getElementById("modalMimar").style.display = "flex";
            } else { ejecutarReserva(); }
        };

        document.getElementById("btnCancelarModal").onclick = () => document.getElementById("modalMimar").style.display="none";
        document.getElementById("btnMesSiguiente").onclick = () => {
            let prox = new Date(fechaActual.getFullYear(), fechaActual.getMonth() + 1, 1);
            if(prox.getMonth() >= 4 && prox.getFullYear() >= 2026) mostrarAviso("Próximamente", "Abril habilitado. ¡Pronto Mayo!");
            else { fechaActual.setMonth(fechaActual.getMonth() + 1); renderCalendario(); }
        };
        document.getElementById("btnMesAnterior").onclick = () => { fechaActual.setMonth(fechaActual.getMonth()-1); renderCalendario(); };

        cargarDatos();
    </script>
</body>
</html>
