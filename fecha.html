<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegir Fecha | Espacio Mimar_T</title>

  <link rel="stylesheet" href="style.css">

  <!-- FLATPICKR -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

  <style>
    body {
      background: #f6f7f9;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .agenda-layout {
      display: flex;
      gap: 40px;
      max-width: 1100px;
      margin: 60px auto;
      padding: 20px;
    }

    .calendar-panel {
      flex: 2;
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .resumen-panel {
      flex: 1;
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #horarios {
      margin-top: 30px;
    }

    #horarios button {
      margin: 6px;
      padding: 10px 18px;
      border-radius: 15px;
      border: none;
      background: #f1f1f1;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #horarios button:hover {
      background: #72bd99;
      color: white;
    }

    .volver-btn {
      background: #ff7675;
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .volver-btn:hover {
      background: #e85c5b;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .agenda-layout {
        flex-direction: column;
        margin: 20px auto;
      }
    }
  </style>
</head>

<body>

<div class="agenda-layout">

  <div class="calendar-panel">
    <h2>Elegí fecha y hora</h2>

    <input type="text" id="calendarInput" hidden>
    <div id="calendarWrapper"></div>

    <div id="horarios"></div>
  </div>

  <div class="resumen-panel">
    <div>
      <h3 id="servicioTitulo"></h3>
    </div>

    <button class="volver-btn" onclick="volver()">Volver</button>
  </div>

</div>

<!-- 🔥 SCRIPT REAL CON RESERVA -->
<script type="module">
  import { db } from "./js/firebase.js";
  import {
    collection,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const servicio = params.get("servicio");
  const clientId = localStorage.getItem("usuario");

  if (!clientId) {
    window.location.href = "index.html";
  }

  document.getElementById("servicioTitulo").innerText = servicio;

  let fechaSeleccionada = null;

  flatpickr("#calendarInput", {
    inline: true,
    appendTo: document.getElementById("calendarWrapper"),
    locale: "es",
    minDate: new Date(),
    defaultDate: new Date(),
    dateFormat: "Y-m-d",
    onChange: function(selectedDates, dateStr) {
      fechaSeleccionada = dateStr;
      generarHorarios();
    }
  });

  function generarHorarios() {
    const horariosDiv = document.getElementById("horarios");
    horariosDiv.innerHTML = "";

    const horarios = [
      "16:00","16:30",
      "17:00","17:30",
      "18:00","18:30",
      "19:00","19:30"
    ];

    horarios.forEach(hora => {
      const btn = document.createElement("button");
      btn.innerText = hora;

      btn.addEventListener("click", async () => {
        if (!fechaSeleccionada) return;

        btn.innerText = "Reservando...";
        btn.disabled = true;

        try {
          await addDoc(collection(db, "reservas"), {
            cliente: clientId,
            servicio: servicio,
            fecha: fechaSeleccionada,
            hora: hora,
            createdAt: serverTimestamp()
          });

          alert("Reserva confirmada ✅");
          window.location.href = "index.html";

        } catch (error) {
          alert("Error al reservar");
          btn.innerText = hora;
          btn.disabled = false;
        }
      });

      horariosDiv.appendChild(btn);
    });
  }

  function volver() {
    window.location.href = "index.html";
  }

  window.volver = volver;
</script>

</body>
</html>
