<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegir fecha | Espacio Mimar</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #f4f7f6; font-family: 'Montserrat', sans-serif; color: #2c3e3a; }
        .container { max-width: 1050px; margin: auto; padding: 40px 20px; text-align: center; }
        .logo { width: 400px; margin-bottom: 15px; }
        
        /* Estilos del Aviso de Saldo */
        #saldoStatus { font-weight: 600; color: #3f8f6f; background: #e8f5ee; display: inline-block; padding: 10px 20px; border-radius: 30px; margin-bottom: 20px; border: 1px solid #72bd99; font-size: 14px; }
        
        /* Calendario y Horarios (Se mantienen igual para no romper nada) */
        .calendario { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); margin-bottom: 30px; }
        .mes { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
        .mes button { border: none; background: #72bd99; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .semana { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 10px; font-weight: 600; color: #666; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .dia { padding: 16px; border-radius: 10px; background: #f1f1f1; cursor: pointer; transition: .2s; }
        .dia:hover { background: #72bd99; color: white; }
        .seleccionado { border: 2px solid #72bd99; color: #72bd99; font-weight: 600; background: #e8f5ee; }
        .domingo { background: #ffd9d9; color: #b00000; cursor: not-allowed; }
        .horarios { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .hora { background: white; border-radius: 8px; padding: 10px; cursor: pointer; border: 1px solid #ddd; }
        .hora.selected { background: #72bd99; color: white; }
        
        .boton { width: 100%; padding: 14px; background: #72bd99; border: none; border-radius: 10px; color: white; font-size: 16px; cursor: pointer; font-weight: 600; transition: .3s; }
        .boton:disabled { background: #ccc; cursor: not-allowed; }

        /* --- MODAL PERSONALIZADO Y DELICADO --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(4px);
        }
        .modal-card {
            background: white; padding: 40px; border-radius: 25px;
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-card h2 { font-family: 'Playfair Display', serif; color: #3f8f6f; margin-bottom: 15px; font-size: 24px; }
        .modal-card p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .modal-btn {
            background: #72bd99; color: white; border: none;
            padding: 12px 30px; border-radius: 50px; cursor: pointer;
            font-weight: 600; font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="img/logo.png" class="logo">
        <div class="infoReservas">
            <h2 style="font-family:'Playfair Display',serif; color:#3f8f6f;">Gestión de Turnos</h2>
            <div id="saldoStatus">Verificando tu membresía...</div>
        </div>

        <div class="calendario">
            <div class="mes">
                <button onclick="cambiarMes(-1)">◀</button>
                <div id="mes"></div>
                <button onclick="cambiarMes(1)">▶</button>
            </div>
            <div class="semana"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div>
            <div class="grid" id="dias"></div>
        </div>

        <div class="horarios" id="horarios"></div>
        <button class="boton" id="reservarBtn" disabled>Reservar turno</button>
    </div>

    <div class="modal-overlay" id="customModal">
        <div class="modal-card">
            <h2>¡Hola! ✨</h2>
            <p id="modalMessage">Ya has utilizado todas las sesiones de tu membresía actual. <br> Te esperamos pronto para renovarla.</p>
            <button class="modal-btn" onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "estetica-8d067",
            apiKey: "TU_API_KEY_AQUÍ", // Asegúrate de que esta sea correcta
            authDomain: "estetica-8d067.firebaseapp.com",
            storageBucket: "estetica-8d067.appspot.com",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let fechaActual = new Date();
        let fechaSeleccionada = null;
        let horaSeleccionada = null;
        let saldoActual = 0;
        const dniUsuario = "43154201"; 

        const reservarBtn = document.getElementById("reservarBtn");
        const saldoStatus = document.getElementById("saldoStatus");

        window.mostrarAvisoDelicado = function(mensaje) {
            document.getElementById("modalMessage").innerHTML = mensaje;
            document.getElementById("customModal").style.display = "flex";
        }

        window.cerrarModal = function() {
            document.getElementById("customModal").style.display = "none";
        }

        async function cargarSaldo() {
            try {
                const docRef = doc(db, "clients", dniUsuario);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    saldoActual = docSnap.data().hoursBalance;
                    saldoStatus.innerText = `Tienes ${saldoActual} sesiones disponibles`;
                    if (saldoActual <= 0) {
                        saldoStatus.style.background = "#ffd9d9";
                        saldoStatus.style.color = "#b00000";
                        saldoStatus.innerText = "Membresía completada";
                        reservarBtn.disabled = true;
                    }
                }
            } catch (e) { console.error(e); }
        }

        window.renderCalendario = function() {
            const year = fechaActual.getFullYear();
            const month = fechaActual.getMonth();
            const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
            document.getElementById("mes").innerText = meses[month] + " " + year;

            const primerDia = new Date(year, month, 1).getDay();
            const diasMes = new Date(year, month + 1, 0).getDate();
            const contenedor = document.getElementById("dias");
            contenedor.innerHTML = "";

            let offset = primerDia === 0 ? 6 : primerDia - 1;
            for (let i = 0; i < offset; i++) { contenedor.appendChild(document.createElement("div")); }

            for (let d = 1; d <= diasMes; d++) {
                let fecha = new Date(year, month, d);
                let div = document.createElement("div");
                div.className = "dia";
                div.innerText = d;

                if (fecha.getDay() === 0) { div.classList.add("domingo"); contenedor.appendChild(div); continue; }
                if (fecha < new Date().setHours(0,0,0,0)) { div.style.opacity = ".3"; contenedor.appendChild(div); continue; }

                div.onclick = () => {
                    if (saldoActual <= 0) {
                        mostrarAvisoDelicado("Has alcanzado el límite de tu membresía. <br> Gracias por elegirnos siempre.");
                        return;
                    }
                    document.querySelectorAll(".dia").forEach(e => e.classList.remove("seleccionado"));
                    div.classList.add("seleccionado");
                    fechaSeleccionada = fecha;
                    generarHorarios();
                };
                contenedor.appendChild(div);
            }
        }

        window.generarHorarios = function() {
            const container = document.getElementById("horarios");
            container.innerHTML = "";
            const horas = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];
            horas.forEach(h => {
                let div = document.createElement("div");
                div.className = "hora";
                div.innerText = h;
                div.onclick = () => {
                    document.querySelectorAll(".hora").forEach(e => e.classList.remove("selected"));
                    div.classList.add("selected");
                    horaSeleccionada = h;
                    reservarBtn.disabled = false;
                };
                container.appendChild(div);
            });
        }

        reservarBtn.addEventListener("click", async function() {
            if (saldoActual <= 0) return;
            reservarBtn.disabled = true;
            reservarBtn.innerText = "Confirmando...";

            try {
                const docRef = doc(db, "clients", dniUsuario);
                await updateDoc(docRef, { hoursBalance: saldoActual - 1 });

                localStorage.setItem("fechaSeleccionada", fechaSeleccionada.toISOString().split("T")[0]);
                localStorage.setItem("horaSeleccionada", horaSeleccionada);
                window.location.href = "confirmar.html";
            } catch (error) {
                reservarBtn.disabled = false;
                reservarBtn.innerText = "Reservar turno";
                console.error(error);
            }
        });

        window.cambiarMes = (n) => { 
            fechaActual.setMonth(fechaActual.getMonth() + n); 
            renderCalendario(); 
        };

        cargarSaldo();
        renderCalendario();
    </script>
</body>
</html>
