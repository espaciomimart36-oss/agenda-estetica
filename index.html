<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso | Espacio Mimar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Ingreso Clientes</h2>

<div class="login-box">

<form id="loginForm">

<input
id="username"
placeholder="Usuario (Ej: Faby M)"
required
>

<input
id="dni"
type="tel"
placeholder="DNI"
required
>

<div
id="errorMsg"
style="color:red;font-size:14px;text-align:center;"
></div>

<button
type="submit"
class="btn-principal"
>
Ingresar
</button>

</form>

</div>

</div>

<script type="module" src="./js/login.js"></script>

</body>

</html>
