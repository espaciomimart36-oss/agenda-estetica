<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso | Espacio Mimar</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--verde-principal:#8ca38a;
--verde-oscuro:#7a8f78;
--texto-suave:#6b706a;
}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:url("img/recepcion.jpeg") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* capa suave */

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(140,163,138,0.35);
backdrop-filter:blur(2px);
}

/* tarjeta */

.container{
position:relative;

background:rgba(255,255,255,0.88);
backdrop-filter:blur(12px);

padding:50px 40px;
border-radius:28px;

text-align:center;

box-shadow:
0 30px 80px rgba(0,0,0,0.15),
0 10px 20px rgba(0,0,0,0.08);

max-width:420px;
width:90%;

border:1px solid rgba(255,255,255,0.4);
}

/* halo verde */

.container::before{
content:"";
position:absolute;
inset:-2px;
border-radius:30px;

background:linear-gradient(
135deg,
rgba(114,189,153,0.35),
transparent 60%
);

z-index:-1;
}

.logo{
width:300px;
margin-bottom:20px;
}

.subtitulo{
color:var(--verde-principal);
font-size:11px;
letter-spacing:3px;
text-transform:uppercase;
margin-bottom:30px;
font-weight:600;
}

/* card profesional */

.profesional-card{
background:rgba(232,237,232,0.9);
padding:22px;
border-radius:16px;
margin-bottom:32px;
}

.profesional{
font-weight:600;
font-size:19px;
color:#3e5140;
margin-bottom:4px;
}

.titulo-profesional{
font-size:13px;
color:#6b706a;
margin-bottom:8px;
}

.credenciales{
font-size:12px;
color:#6b706a;
line-height:1.6;
margin-bottom:10px;
}

.descripcion{
font-size:13px;
color:#7a7a7a;
line-height:1.6;
font-style:italic;
}

h2{
font-size:20px;
font-weight:400;
color:#444;
margin-bottom:25px;
letter-spacing:1px;
}

.input-group{
margin-bottom:15px;
text-align:left;
}

input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #e0e0e0;
font-size:15px;
outline:none;
transition:all .3s ease;
box-sizing:border-box;
background:#ffffff;
}

input:focus{
border-color:var(--verde-principal);
box-shadow:0 0 0 4px rgba(140,163,138,0.15);
}

button{
background:var(--verde-principal);
border:none;
color:white;
padding:18px;
width:100%;
border-radius:12px;
font-size:14px;
font-weight:600;
text-transform:uppercase;
letter-spacing:2px;
cursor:pointer;
transition:all .3s ease;
margin-top:10px;
}

button:hover{
background:var(--verde-oscuro);
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(140,163,138,0.25);
}

.error{
color:#d9534f;
font-size:13px;
margin-top:15px;
font-weight:500;
display:none;
}

footer{
margin-top:30px;
font-size:10px;
color:#bbb;
letter-spacing:1px;
}

</style>

</head>

<body>

<div class="container">

<img src="img/logo.png" class="logo">

<div class="subtitulo">
Estética Avanzada
</div>

<div class="profesional-card">

<div class="profesional">
Gimena Knack
</div>

<div class="titulo-profesional">
Farmacéutica · Dermatocosmiatra
</div>

<div class="credenciales">
MP 1212 · R.C. 2319
</div>

<div class="descripcion">
Tratamientos dermoestéticos personalizados con respaldo farmacéutico y tecnología avanzada para el cuidado integral de la piel
</div>

</div>

<h2>
Ingreso de Pacientes
</h2>

<div class="input-group">
<input id="nombre" placeholder="Nombre + inicial del apellido (en minúsculas)">
</div>

<div class="input-group">
<input id="dni" placeholder="DNI (sin puntos)">
</div>

<button id="btnIngresar">
Iniciar Sesión
</button>

<div id="error" class="error"></div>

<footer>
TU BIENESTAR ES NUESTRA PRIORIDAD
</footer>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"TU_API_KEY",
authDomain:"TU_AUTH_DOMAIN",
projectId:"estetica-8d067",
storageBucket:"TU_BUCKET",
messagingSenderId:"TU_ID",
appId:"TU_APP_ID"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

document.getElementById("btnIngresar").addEventListener("click",async()=>{

const nombre=document.getElementById("nombre").value.trim();
const dni=document.getElementById("dni").value.trim();
const error=document.getElementById("error");

error.style.display="none";

if(nombre=="" || dni==""){
error.innerText="Por favor, complete todos los campos.";
error.style.display="block";
return;
}

try{

const ref=doc(db,"clients",dni);
const snapshot=await getDoc(ref);

if(!snapshot.exists()){
error.innerText="Paciente no encontrado.";
error.style.display="block";
return;
}

const cliente=snapshot.data();

if(cliente.fullName.toLowerCase()!==nombre.toLowerCase()){
error.innerText="El nombre no coincide con el DNI.";
error.style.display="block";
return;
}

localStorage.setItem("clienteNombre",cliente.fullName);
localStorage.setItem("clienteDNI",cliente.dni);

window.location.href=cliente.consultaNutricionalRespondida
? "servicios.html"
: "historia.html";

}catch(e){

console.error(e);
error.innerText="Error de conexión.";
error.style.display="block";

}

});

</script>

</body>
</html>
