<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso | Espacio Mimar</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e8f2ef,#f5f7f6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:22px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,0.08);
max-width:420px;
width:90%;
}

.logo{
width:300px;
margin-bottom:15px;
}

.subtitulo{
color:#777;
font-size:14px;
margin-bottom:18px;
}

.profesional{
font-weight:bold;
font-size:17px;
margin-bottom:4px;
}

.credenciales{
font-size:13px;
color:#666;
margin-bottom:15px;
}

.descripcion{
font-size:13px;
color:#555;
line-height:1.5;
margin-bottom:25px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:15px;
outline:none;
}

input:focus{
border:1px solid #72bd99;
}

button{
background:#72bd99;
border:none;
color:white;
padding:14px;
width:100%;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#5faa86;
}

.error{
color:red;
font-size:14px;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<img src="img/logo.png" class="logo">

<div class="subtitulo">
Centro profesional de estética avanzada
</div>

<div class="profesional">
Gimena Knack
</div>

<div class="credenciales">
Farmacéutica MP 1212<br>
Cosmetóloga · Cosmiatra · Dermocosmiatra
</div>

<div class="descripcion">
Especialista en tratamientos faciales y corporales personalizados.
Cada paciente recibe una evaluación profesional y un tratamiento adaptado a sus necesidades.
</div>

<h2>Ingreso pacientes</h2>

<input id="nombre" placeholder="Nombre">
<input id="dni" placeholder="DNI">

<button id="btnIngresar">
Ingresar
</button>

<div id="error" class="error"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "TU_AUTH_DOMAIN",
projectId: "estetica-8d067",
storageBucket: "TU_BUCKET",
messagingSenderId: "TU_ID",
appId: "TU_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("btnIngresar").addEventListener("click", async ()=>{

const nombre = document.getElementById("nombre").value.trim();
const dni = document.getElementById("dni").value.trim();
const error = document.getElementById("error");

error.style.display="none";

if(nombre=="" || dni==""){

error.innerText="Complete los datos";
error.style.display="block";
return;

}

try{

const ref = doc(db,"clients",dni);
const snapshot = await getDoc(ref);

if(!snapshot.exists()){

error.innerText="Usuario no encontrado";
error.style.display="block";
return;

}

const cliente = snapshot.data();

if(cliente.fullName.toLowerCase() !== nombre.toLowerCase()){

error.innerText="Nombre incorrecto";
error.style.display="block";
return;

}

localStorage.setItem("clienteNombre",cliente.fullName);
localStorage.setItem("clienteDNI",cliente.dni);

if(cliente.consultaNutricionalRespondida === true){

window.location.href="servicios.html"

}else{

window.location.href="historia.html"

}

}catch(e){

console.error(e);
error.innerText="Error conectando con la base de datos";
error.style.display="block";

}

});

</script>

</body>
</html>
