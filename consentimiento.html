<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consentimiento informado</title>

<style>

body{
background:#f4f7f6;
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.text{
height:220px;
overflow:auto;
border:1px solid #eee;
padding:15px;
border-radius:10px;
font-size:14px;
margin-bottom:20px;
}

button{

width:100%;
background:#72bd99;
border:none;
padding:14px;
border-radius:10px;
color:white;
font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<h2>Consentimiento informado</h2>

<div class="text">

Autorizo el tratamiento de mis datos personales conforme a la legislación vigente.

</div>

<label>
<input type="checkbox" id="check">
Acepto el consentimiento
</label>

<button onclick="continuar()">Continuar</button>

</div>

<script>

function continuar(){

if(!document.getElementById("check").checked){
alert("Debes aceptar el consentimiento")
return
}

localStorage.setItem("consentimiento","ok")

window.location.href="historia.html"

}

</script>

</body>
</html>
