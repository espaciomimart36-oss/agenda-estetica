<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar turno · Adriana Cerri</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f4fbf7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 32px; max-width: 420px; width: 90%; box-shadow: 0 12px 36px rgba(6,64,43,0.12); border: 1px solid #d5e8df; }
        h2 { color: #06402B; margin: 0 0 6px; font-size: 1.3rem; }
        p { color: #4a6f5f; font-size: 13px; margin: 0 0 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #d5e8df; border-radius: 10px; box-sizing: border-box; font-size: 14px; margin-bottom: 12px; outline: none; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2f7c5d, #06402B); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #msg { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; display: none; }
        .ok { background: #e8f5ee; color: #1f6548; border: 1px solid #b7dfcc; }
        .err { background: #fdf8e8; color: #7a5e00; border: 1px solid #D4AF37; }
        .datos { background: #f5fcf8; border: 1px solid #d5e8df; border-radius: 12px; padding: 14px; margin-bottom: 20px; font-size: 13px; color: #2f5a47; line-height: 1.8; }
        .datos b { color: #06402B; }
    </style>
</head>
<body>
<div class="card">
    <h2>Registrar turno pasado</h2>
    <p>Este formulario inserta el turno directamente en Firestore. Usá las credenciales del panel admin.</p>
    <div class="datos">
        <div><b>Paciente:</b> Adriana Cerri</div>
        <div><b>Fecha:</b> 10 de abril de 2026</div>
        <div><b>Horario:</b> 19:00 hs</div>
        <div><b>Servicio:</b> Facial</div>
        <div><b>Estado:</b> Confirmado</div>
    </div>
    <input type="email" id="email" value="espaciomimart36@gmail.com" placeholder="Email admin">
    <input type="password" id="pass" placeholder="Contraseña del panel">
    <button class="btn" id="btn" onclick="registrar()">Registrar en Firestore</button>
    <div id="msg"></div>
</div>

<script type="module">
    import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBc5435tsDnJ_yJqO1ppwSjxSpCIhpjgew",
        authDomain: "estetica-8d067.firebaseapp.com",
        projectId: "estetica-8d067",
        storageBucket: "estetica-8d067.firebasestorage.app",
        messagingSenderId: "501220214938",
        appId: "1:501220214938:web:af6e262c23d9a7ea853723"
    };

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);

    window.registrar = async () => {
        const btn = document.getElementById("btn");
        const msg = document.getElementById("msg");
        const email = document.getElementById("email").value.trim();
        const pass  = document.getElementById("pass").value;
        if (!pass) { mostrar("Ingresá la contraseña del panel", "err"); return; }
        btn.disabled = true;
        btn.textContent = "Autenticando...";
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            btn.textContent = "Guardando en Firestore...";
            const ref = await addDoc(collection(db, "reservas"), {
                cliente:       "Adriana Cerri",
                clienteNombre: "Adriana Cerri",
                nombre:        "Adriana Cerri",
                title:         "Adriana Cerri",
                displayName:   "Adriana Cerri",
                phone:         "",
                telefono:      "",
                dni:           "",
                servicio:      "Facial",
                fecha:         "2026-04-10",
                hora:          "19:00",
                origen:        "admin",
                status:        "confirmado",
                estado:        "confirmado",
                reminderSent:  false,
                timestamp:     serverTimestamp(),
                creadoPor:     "admin_manual"
            });
            mostrar("✓ Turno registrado con éxito. ID: " + ref.id, "ok");
            btn.textContent = "¡Registrado!";
        } catch(e) {
            console.error(e);
            mostrar("Error: " + (e.message || e.code || "desconocido"), "err");
            btn.disabled = false;
            btn.textContent = "Registrar en Firestore";
        }
    };

    function mostrar(text, tipo) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.className = tipo;
        msg.style.display = "block";
    }
</script>
</body>
</html>
