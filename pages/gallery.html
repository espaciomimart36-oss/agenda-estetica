<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria en pausa | Espacio Mimar T</title>
    <meta name="description" content="Seccion de galeria temporalmente deshabilitada.">
    <style>
        :root {
            --bg: #f2f6f4;
            --surface: #ffffff;
            --ink: #273630;
            --muted: #6b7771;
            --primary: #72bd99;
            --primary-strong: #4e9d7a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Montserrat, sans-serif;
            background:
                radial-gradient(circle at 15% 10%, rgba(114,189,153,.2), transparent 35%),
                radial-gradient(circle at 85% 80%, rgba(114,189,153,.14), transparent 30%),
                var(--bg);
            color: var(--ink);
        }
        .card {
            width: min(640px, 100%);
            background: var(--surface);
            border: 1px solid #dce8e2;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(29, 51, 42, .1);
            padding: 34px 24px;
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(30px, 6vw, 46px);
            font-family: "Cormorant Garamond", serif;
            font-style: italic;
        }
        p {
            margin: 0 auto 22px;
            max-width: 520px;
            color: var(--muted);
            line-height: 1.7;
            font-size: 15px;
        }
        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        a {
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-strong));
            color: #fff;
        }
        .btn-secondary {
            background: #fff;
            color: var(--primary-strong);
            border: 1px solid var(--primary);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Galeria en pausa</h1>
        <p>La seccion de galeria de servicios esta temporalmente deshabilitada. Estamos priorizando la experiencia de reserva y el catalogo principal.</p>
        <div class="actions">
            <a href="/servicios-pro.html" class="btn-primary">Ver servicios</a>
            <a href="/" class="btn-secondary">Volver al inicio</a>
        </div>
    </main>
</body>
</html>
